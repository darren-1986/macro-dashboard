<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | Final Stability</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; height: 100%; }
        .bias-box { background: #1e222d; border: 1px solid #363a45; padding: 10px; border-radius: 8px; text-align: center; flex: 1; }
    </style>
</head>
<body class="p-4 md:p-6">

    <header class="flex flex-col lg:flex-row justify-between items-start mb-6 gap-6 border-b border-gray-800 pb-6">
        <div>
            <h1 class="text-4xl font-black text-yellow-500 italic uppercase tracking-tighter">MacroPulse AI</h1>
            <p class="text-[11px] text-gray-500 font-mono tracking-widest uppercase mt-1">Institutional Terminal • Mar 06, 2026</p>
        </div>
        <div class="flex flex-wrap gap-3 w-full lg:w-auto">
            <div class="bias-box border-l-4 border-l-blue-500"><span class="text-[10px] uppercase text-gray-400 font-bold block">Risk</span><div class="text-sm font-black text-blue-400 italic">RISK-OFF (23.75)</div></div>
            <div class="bias-box border-l-4 border-l-yellow-600"><span class="text-[10px] uppercase text-gray-400 font-bold block">Gold</span><div class="text-sm font-black text-yellow-500 italic">BULLISH</div></div>
            <div class="bias-box border-l-4 border-l-orange-500"><span class="text-[10px] uppercase text-gray-400 font-bold block">AUD</span><div class="text-sm font-black text-orange-400 italic">WEAK</div></div>
            <div class="bias-box border-l-4 border-l-green-500"><span class="text-[10px] uppercase text-gray-400 font-bold block">USA</span><div class="text-sm font-black text-green-400 italic">STRONG (DXY)</div></div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow overflow-hidden">
        
        <div class="lg:col-span-3 h-full">
            <div class="widget-card">
                <div class="p-2 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-blue-400 text-center">Macro Events</div>
                <div class="flex-grow">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                    { "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%", "importanceFilter": "0,1", "currencyFilter": "USD,AUD" }
                    </script>
                </div>
            </div>
        </div>

        <div class="lg:col-span-6 flex flex-col gap-6 h-full">
            <div class="grid grid-cols-2 gap-4 h-3/5">
                <div id="c1" class="widget-card"></div>
                <div id="c2" class="widget-card"></div>
            </div>
            <div class="grid grid-cols-2 gap-4 h-2/5">
                <div class="widget-card">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    { "interval": "1h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "OANDA:XAUUSD", "colorTheme": "dark" }
                    </script>
                </div>
                <div class="widget-card">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    { "interval": "1h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "FX:AUDUSD", "colorTheme": "dark" }
                    </script>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 h-full">
            <div class="widget-card">
                <div class="p-3 bg-[#1e222d] border-b border-gray-800 flex justify-between items-center">
                    <span class="text-[11px] font-black uppercase text-yellow-500 italic">Macro Wire</span>
                    <span class="text-[9px] text-green-500 font-bold animate-pulse">LIVE</span>
                </div>
                <div class="flex-grow">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                    {
                      "feedMode": "all_symbols",
                      "symbolsGroups": [
                        {
                          "name": "Macro Focus",
                          "symbols": [
                            {"proName": "OANDA:XAUUSD", "title": "Gold"},
                            {"proName": "FX:AUDUSD", "title": "Australia"},
                            {"proName": "TVC:DXY", "title": "USA Index"}
                          ]
                        }
                      ],
                      "isTransparent": true,
                      "displayMode": "regular",
                      "width": "100%",
                      "height": "100%",
                      "colorTheme": "dark",
                      "locale": "en"
                    }
                    </script>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        window.onload = () => {
            new TradingView.widget({ "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "60", "theme": "dark", "container_id": "c1", "hide_top_toolbar": true });
            new TradingView.widget({ "autosize": true, "symbol": "FX:AUDUSD", "interval": "60", "theme": "dark", "container_id": "c2", "hide_top_toolbar": true });
        };
    </script>
</body>
</html>
