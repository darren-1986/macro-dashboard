<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | Gold & AUD Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 12px; overflow: hidden; }
        .bias-box { background: #1e222d; border: 1px solid #363a45; padding: 12px; border-radius: 8px; text-align: center; flex: 1; }
    </style>
</head>
<body class="p-4 md:p-6">

    <header class="flex flex-col lg:flex-row justify-between items-center mb-8 gap-4 border-b border-gray-800 pb-6">
        <div>
            <h1 class="text-3xl font-black text-yellow-500 italic tracking-tighter">MACROPULSE AI</h1>
            <p class="text-xs text-gray-500 font-mono tracking-widest uppercase">Institutional Gold & FX Dashboard</p>
        </div>

        <div class="flex gap-3 w-full lg:w-auto">
            <div class="bias-box border-l-4 border-l-blue-500">
                <span class="text-[9px] uppercase text-gray-500 font-bold block mb-1 text-left">Market Climate</span>
                <div id="risk-sentiment" class="text-sm font-black text-blue-400 uppercase">ANALYZING...</div>
            </div>
            <div class="bias-box border-l-4 border-l-yellow-500">
                <span class="text-[9px] uppercase text-gray-500 font-bold block mb-1 text-left">Gold Bias</span>
                <div id="gold-bias" class="text-sm font-black text-yellow-500 uppercase">BULLISH</div>
            </div>
            <div class="bias-box border-l-4 border-l-orange-500">
                <span class="text-[9px] uppercase text-gray-500 font-bold block mb-1 text-left">AUD Bias</span>
                <div id="aud-bias" class="text-sm font-black text-gray-400 uppercase">NEUTRAL</div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 xl:grid-cols-2 gap-6 mb-6">
        <div class="widget-card h-[450px]" id="gold_chart"></div>
        <div class="widget-card h-[450px]" id="aud_chart"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-6">
        <div class="widget-card h-[380px]">
            <div class="p-3 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-yellow-500">Gold Technical Radar</div>
            <div class="h-full">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                { "interval": "4h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "OANDA:XAUUSD", "showIntervalTabs": true, "locale": "en", "colorTheme": "dark" }
                </script>
            </div>
        </div>
        <div class="widget-card h-[380px]">
            <div class="p-3 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-orange-400">AUD/USD Technical Radar</div>
            <div class="h-full">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                { "interval": "4h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "FX:AUDUSD", "showIntervalTabs": true, "locale": "en", "colorTheme": "dark" }
                </script>
            </div>
        </div>
        <div class="widget-card h-[380px]">
            <div class="p-3 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 text-blue-400 uppercase font-mono">Volatility Index (VIX)</div>
            <div class="h-full w-full bg-[#131722]">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
                    {
                      "symbols": [ ["VIX Spot", "TVC:VIX|1D"] ],
                      "chartOnly": true,
                      "width": "100%",
                      "height": "100%",
                      "locale": "en",
                      "colorTheme": "dark",
                      "autosize": true,
                      "showVolume": false,
                      "showMA": false,
