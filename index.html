<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | V7.6 Pro-Logic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 8px; overflow: hidden; }
        
        /* ORIGINAL BIAS BOX STYLING */
        .bias-box { 
            background: #1e222d; border: 1px solid #363a45; padding: 10px 14px; border-radius: 6px; 
            min-width: 155px; border-left: 4px solid #374151;
        }
        .vix-badge { background: linear-gradient(270deg, #450a0a 0%, #1e222d 100%); border: 1px solid #7f1d1d; border-right: 4px solid #ef4444; }
        
        .bullish-active { border-left-color: #22c55e !important; color: #22c55e !important; }
        .bearish-active { border-left-color: #ef4444 !important; color: #ef4444 !important; }
        
        /* DATA OVERLAY FIX */
        .live-label { font-size: 13px; font-weight: 900; color: #fff; text-transform: uppercase; }
    </style>
</head>
<body class="p-4">

    <header class="flex flex-col xl:flex-row justify-between items-center mb-4 gap-4 border-b border-gray-800 pb-4">
        <div class="flex items-center gap-8">
            <div>
                <h1 class="text-2xl font-black text-yellow-500 italic uppercase leading-none">MacroPulse AI</h1>
                <p class="text-[9px] text-gray-500 font-mono tracking-widest uppercase mt-1">Institutional Build 7.6</p>
            </div>
            <div class="flex gap-3">
                <div id="box-sent" class="bias-box bearish-active"><span class="text-[9px] uppercase text-gray-400 font-bold block mb-1">Sentiment</span><div id="lbl-sent" class="live-label">RISK-OFF</div></div>
                <div id="box-gold" class="bias-box bullish-active"><span class="text-[9px] uppercase text-gray-400 font-bold block mb-1">XAU Bias</span><div id="lbl-gold" class="live-label text-yellow-500">STRONG BUY</div></div>
                <div id="box-aud" class="bias-box bearish-active"><span class="text-[9px] uppercase text-gray-400 font-bold block mb-1">AUD Bias</span><div id="lbl-aud" class="live-label">SELL BIAS</div></div>
            </div>
        </div>
        <div class="vix-badge flex items-center gap-4 px-4 py-1 rounded-md">
            <div class="text-right">
                <span class="text-[10px] font-black uppercase text-red-400 block">VIX TRACKER</span>
                <span class="text-[9px] text-gray-500 uppercase font-mono">March 06, 2026</span>
            </div>
            <div class="h-10 w-[1px] bg-gray-700"></div>
            <div style="width: 120px; height: 40px;">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
                { "symbol": "CBOE:VIX", "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%" }
                </script>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-12 gap-4">
        <div class="col-span-3 flex flex-col gap-4">
            <div class="widget-card">
                <div style="position:relative;padding-bottom:56.25%;height:0;background:#000;">
                    <iframe style="position:absolute;top:0;left:0;width:100%;height:100%;" src="https://www.youtube.com/embed/iEpJwprxDdk?autoplay=1&mute=1" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
            <div class="widget-card" style="height: 1000px;">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                { "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%", "importanceFilter": "0,1", "currencyFilter": "USD,AUD" }
                </script>
            </div>
        </div>

        <div class="col-span-6 flex flex-col gap-4">
            <div class="flex gap-4 h-[320px]">
                <div id="chart-gold" class="widget-card w-1/2"></div>
                <div id="chart-aud" class="widget-card w-1/2"></div>
            </div>

            <div id="v7-terminal" style="background: #010409; border: 1px solid #30363d; border-radius: 4px; overflow: hidden;">
                <div style="background: #161b22; padding: 12px; border-bottom: 2px solid #238636; display: flex; justify-content: space-between;">
                    <span style="font-size: 13px; font-weight: 900;">MACRO_ENGINE_V7</span>
                    <span style="font-size: 10px; color: #3fb950;">[ACTIVE_2026_STREAM]</span>
                </div>
                <div style="padding: 20px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
                        <div style="background: #0d1117; padding: 10px; border: 1px solid #30363d; height: 80px;">
                            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
                            { "symbol": "OANDA:XAUUSD", "colorTheme": "dark", "isTransparent": true, "width": "100%" }
                            </script>
                        </div>
                        <div style="background: #0d1117; padding: 10px; border: 1px solid #30363d; height: 80px;">
                            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
                            { "symbol": "FX:AUDUSD", "colorTheme": "dark", "isTransparent": true, "width": "100%" }
                            </script>
                        </div>
                    </div>
                    <div style="background: #0d1117; border: 1px solid #21262d; padding: 20px; text-align: center;">
                        <div style="font-size: 10px; color: #8b949e; letter-spacing: 2px;">CONFLUENCE SCORE</div>
                        <div style="font-size: 64px; font-weight: 900; color: #3fb950;">5/5</div>
                        <div style="background: #238636; padding: 6px; border-radius: 4px; font-size: 12px; font-weight: 800;">GOLD SAFE-HAVEN LONG</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-span-3 flex flex-col gap-4">
            <div class="widget-card" style="height: 500px;">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                { "feedMode": "all_symbols", "symbolsGroups": [{"name": "Macro", "symbols": ["OANDA:XAUUSD", "FX:AUDUSD"]}], "isTransparent": true, "displayMode": "regular", "width": "100%", "height": "100%", "colorTheme": "dark" }
                </script>
            </div>
            <div class="widget-card" style="height: 500px; overflow-y: auto;">
                <a class="twitter-timeline" data-theme="dark" href="https://twitter.com/GoldPredict?ref_src=twsrc%5Etfw">Feed Loading...</a> 
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script async src="https://platform.twitter.com/widgets.js"></script>
    <script>
        window.onload = () => {
            new TradingView.widget({ "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15", "theme": "dark", "container_id": "chart-gold", "hide_top_toolbar": true });
            new TradingView.widget({ "autosize": true, "symbol": "FX:AUDUSD", "interval": "15", "theme": "dark", "container_id": "chart-aud", "hide_top_toolbar": true });
        };
    </script>
</body>
</html>
