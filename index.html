<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | 24/7 Auto-Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow: hidden; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .bias-box { background: #1e222d; border: 1px solid #363a45; padding: 6px 10px; border-radius: 6px; text-align: center; flex: 1; transition: all 0.5s ease; }
        .vix-badge { background: linear-gradient(270deg, #450a0a 0%, #1e222d 100%); border: 1px solid #7f1d1d; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #363a45; border-radius: 10px; }
        .up-box { border-left: 3px solid #22c55e; color: #22c55e; }
        .down-box { border-left: 3px solid #ef4444; color: #ef4444; }
    </style>
</head>
<body class="p-4 h-screen flex flex-col">

    <header class="flex flex-col xl:flex-row justify-between items-center mb-4 gap-4 border-b border-gray-800 pb-3">
        <div class="flex items-center gap-6 w-full xl:w-auto">
            <div>
                <h1 class="text-xl font-black text-yellow-500 italic uppercase leading-none">MacroPulse AI</h1>
                <p class="text-[8px] text-gray-500 font-mono tracking-widest uppercase">Institutional Terminal</p>
            </div>
            <div class="flex gap-2" id="live-bias-row">
                <div id="sent-box" class="bias-box"><span class="text-[8px] text-gray-400 font-bold block uppercase">Sentiment</span><div class="val text-[10px] font-black uppercase">Syncing...</div></div>
                <div id="gold-box" class="bias-box"><span class="text-[8px] text-gray-400 font-bold block uppercase">Gold Bias</span><div class="val text-[10px] font-black uppercase">Syncing...</div></div>
                <div id="aud-box" class="bias-box"><span class="text-[8px] text-gray-400 font-bold block uppercase">Australia</span><div class="val text-[10px] font-black uppercase">Syncing...</div></div>
                <div id="usa-box" class="bias-box"><span class="text-[8px] text-gray-400 font-bold block uppercase">USA (DXY)</span><div class="val text-[10px] font-black uppercase">Syncing...</div></div>
            </div>
        </div>
        
        <div class="vix-badge flex items-center gap-3 px-3 py-1.5 rounded-md border-r-4 border-r-red-600 ml-auto">
            <div class="text-right">
                <span id="vix-status" class="text-[9px] font-black uppercase text-red-400 block">Monitoring</span>
                <span class="text-[8px] text-gray-500 uppercase">VIX Spot</span>
            </div>
            <div class="h-6 w-[1px] bg-gray-700"></div>
            <div class="text-right">
                <div id="vix-val" class="text-lg font-black text-white italic leading-none">--.--</div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 flex-grow overflow-hidden">
        <div class="lg:col-span-3 flex flex-col gap-4 overflow-hidden">
            <div class="widget-card shrink-0">
                <div class="p-1 bg-[#1e222d] text-[9px] font-bold border-b border-gray-800 uppercase text-yellow-500 text-center">Bloomberg Live</div>
                <div class="video-container"><iframe src="https://www.youtube.com/embed/iEpJwprxDdk?autoplay=1&mute=1" frameborder="0" allowfullscreen></iframe></div>
            </div>
            <div class="widget-card flex-grow">
                <div class="p-1.5 bg-[#1e222d] text-[9px] font-bold border-b border-gray-800 uppercase text-blue-400 text-center">Macro Events</div>
                <div class="flex-grow h-full" id="calendar-container">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                    { "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%", "importanceFilter": "0,1", "currencyFilter": "USD,AUD" }
                    </script>
                </div>
            </div>
        </div>

        <div class="lg:col-span-6 flex flex-col gap-4 overflow-y-auto custom-scroll pr-1">
            <div class="grid grid-cols-2 gap-3 h-[300px] shrink-0">
                <div id="gold_chart" class="widget-card"></div>
                <div id="aud_chart" class="widget-card"></div>
            </div>
            <div class="grid grid-cols-2 gap-3 h-[250px] shrink-0">
                <div class="widget-card"><div id="gauge-gold" class="h-full w-full"></div></div>
                <div class="widget-card"><div id="gauge-aud" class="h-full w-full"></div></div>
            </div>
        </div>

        <div class="lg:col-span-3 widget-card h-full">
            <div class="p-3 bg-[#1e222d] border-b border-gray-800 flex justify-between items-center shrink-0">
                <span class="text-[10px] font-black uppercase text-yellow-500 italic">Market Wire</span>
                <span class="text-[8px] text-green-500 font-bold animate-pulse uppercase">Live</span>
            </div>
            <div class="flex-grow overflow-y-auto custom-scroll">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                { "feedMode": "all_symbols", "symbolsGroups": [{"name": "Macro", "symbols": ["OANDA:XAUUSD", "FX:AUDUSD", "TVC:DXY"]}], "isTransparent": true, "displayMode": "regular", "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "en" }
                </script>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const API_KEY = 'PASTE_YOUR_FINNHUB_KEY_HERE'; // Get free key at finnhub.io

        async function fetchMarketData() {
            if (API_KEY === 'PASTE_YOUR_FINNHUB_KEY_HERE') return;

            try {
                // Fetch Gold (XAUUSD), AUDUSD, and DXY (via UUP Proxy or direct)
                const symbols = ['OANDA:XAU_USD', 'FX:AUD_USD', 'DXY'];
                const goldRes = await fetch(`https://finnhub.io/api/v1/quote?symbol=OANDA:XAU_USD&token=${API_KEY}`);
                const audRes = await fetch(`https://finnhub.io/api/v1/quote?symbol=FX:AUD_USD&token=${API_KEY}`);
                
                const g = await goldRes.json();
                const a = await audRes.json();

                // Logic: Gold Box
                const goldBox = document.getElementById('gold-box');
                goldBox.className = `bias-box ${g.dp >= 0 ? 'up-box' : 'down-box'}`;
                goldBox.querySelector('.val').innerText = g.dp >= 0 ? `Bullish (${g.dp}%)` : `Bearish (${g.dp}%)`;

                // Logic: Australia Box
                const audBox = document.getElementById('aud-box');
                audBox.className = `bias-box ${a.dp >= 0 ? 'up-box' : 'down-box'}`;
                audBox.querySelector('.val').innerText = a.dp >= 0 ? 'AUD Strong' : 'AUD Weak';

                // Logic: Sentiment & USA
                const sentBox = document.getElementById('sent-box');
                const usaBox = document.getElementById('usa-box');
                
                if (g.dp > 0.2 && a.dp < 0) {
                    sentBox.className = 'bias-box down-box';
                    sentBox.querySelector('.val').innerText = 'Risk-Off';
                    usaBox.className = 'bias-box up-box';
                    usaBox.querySelector('.val').innerText = 'DXY Strong';
                } else {
                    sentBox.className = 'bias-box up-box';
                    sentBox.querySelector('.val').innerText = 'Risk-On';
                    usaBox.className = 'bias-box down-box';
                    usaBox.querySelector('.val').innerText = 'DXY Flat';
                }

                // VIX Mockup (VIX needs a separate paid feed, so we simulate based on Gold Vol)
                document.getElementById('vix-val').innerText = (18 + (Math.abs(g.dp) * 5)).toFixed(2);

            } catch (e) { console.error("API Error", e); }
        }

        window.onload = () => {
            new TradingView.widget({ "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15", "theme": "dark", "container_id": "gold_chart", "hide_top_toolbar": true });
            new TradingView.widget({ "autosize": true, "symbol": "FX:AUDUSD", "interval": "15", "theme": "dark", "container_id": "aud_chart", "hide_top_toolbar": true });
            
            // Auto-refresh data every 60 seconds
            fetchMarketData();
            setInterval(fetchMarketData, 60000);
        };
    </script>
</body>
</html>
