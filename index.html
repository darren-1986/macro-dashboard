<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | Final Live HUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow: hidden; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .bias-box { background: #1e222d; border: 1px solid #363a45; border-radius: 6px; position: relative; flex: 1; min-width: 140px; height: 65px; padding: 5px; }
        .vix-badge { background: linear-gradient(270deg, #450a0a 0%, #1e222d 100%); border: 1px solid #7f1d1d; height: 65px; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #363a45; border-radius: 10px; }
        .label-text { font-size: 8px; font-weight: 800; color: #9ca3af; text-transform: uppercase; margin-bottom: -15px; position: relative; z-index: 10; padding-left: 5px; }
        .refresh-active { animation: blink 0.5s ease-in-out; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 h-screen flex flex-col">

    <header class="flex flex-col xl:flex-row justify-between items-center mb-4 gap-4 border-b border-gray-800 pb-3">
        <div class="flex items-center gap-6 w-full xl:w-auto">
            <div>
                <h1 class="text-xl font-black text-yellow-500 italic uppercase leading-none">MacroPulse AI</h1>
                <p class="text-[8px] text-gray-500 font-mono tracking-widest uppercase">Institutional Terminal</p>
            </div>
            <div class="flex gap-2">
                <div class="bias-box" id="gold-wrap"><div class="label-text">Gold Bias</div><div class="h-full w-full pt-2" id="gold-widget"></div></div>
                <div class="bias-box" id="aud-wrap"><div class="label-text">Australia</div><div class="h-full w-full pt-2" id="aud-widget"></div></div>
                <div class="bias-box" id="usa-wrap"><div class="label-text">USA (DXY)</div><div class="h-full w-full pt-2" id="usa-widget"></div></div>
            </div>
        </div>
        <div class="vix-badge flex items-center gap-3 px-4 rounded-md border-r-4 border-r-red-600 ml-auto overflow-hidden">
            <div class="text-right shrink-0">
                <span class="text-[9px] font-black uppercase text-red-400 block">VIX Sentiment</span>
                <span class="text-[8px] text-gray-500 uppercase">March 06, 2026</span>
            </div>
            <div class="h-8 w-[1px] bg-gray-700"></div>
            <div class="w-24 h-full pt-2" id="vix-widget"></div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 flex-grow overflow-hidden">
        <div class="lg:col-span-3 flex flex-col gap-4 overflow-hidden">
            <div class="widget-card shrink-0">
                <div class="p-1 bg-[#1e222d] text-[9px] font-bold border-b border-gray-800 uppercase text-yellow-500 text-center">Bloomberg Live</div>
                <div class="video-container"><iframe src="https://www.youtube.com/embed/iEpJwprxDdk?autoplay=1&mute=1" frameborder="0" allowfullscreen></iframe></div>
            </div>
            <div class="widget-card flex-grow">
                <div class="p-1.5 bg-[#1e222d] text-[9px] font-bold border-b border-gray-800 uppercase text-blue-400 text-center">Macro Events</div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                { "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%", "importanceFilter": "0,1", "currencyFilter": "USD,AUD" }
                </script>
            </div>
        </div>
        <div class="lg:col-span-6 flex flex-col gap-4 overflow-y-auto custom-scroll pr-1">
            <div class="grid grid-cols-2 gap-3 h-[300px] shrink-0"><div id="gold_chart" class="widget-card"></div><div id="aud_chart" class="widget-card"></div></div>
            <div class="grid grid-cols-2 gap-3 h-[250px] shrink-0">
                <div class="widget-card"><script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>{ "interval": "1h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "OANDA:XAUUSD", "colorTheme": "dark" }</script></div>
                <div class="widget-card"><script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>{ "interval": "1h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "FX:AUDUSD", "colorTheme": "dark" }</script></div>
            </div>
        </div>
        <div class="lg:col-span-3 widget-card h-full">
            <div class="p-3 bg-[#1e222d] border-b border-gray-800 flex justify-between items-center shrink-0"><span class="text-[10px] font-black uppercase text-yellow-500 italic">Market Wire</span><span class="text-[8px] text-green-500 font-bold animate-pulse uppercase">Live</span></div>
            <div class="flex-grow overflow-y-auto custom-scroll">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>{ "feedMode": "all_symbols", "symbolsGroups": [{"name": "Macro", "symbols": ["OANDA:XAUUSD", "FX:AUDUSD", "TVC:DXY"]}], "isTransparent": true, "displayMode": "regular", "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "en" }</script>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const widgetConfig = { 'gold-widget': 'OANDA:XAUUSD', 'aud-widget': 'FX:AUDUSD', 'usa-widget': 'TVC:DXY', 'vix-widget': 'TVC:VIX' };
        function refreshData() {
            Object.keys(widgetConfig).forEach(id => {
                const container = document.getElementById(id);
                container.classList.add('refresh-active');
                container.innerHTML = '';
                const script = document.createElement('script');
                script.type = 'text/javascript';
                script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js';
                script.async = true;
                script.innerHTML = JSON.stringify({ "symbol": widgetConfig[id], "colorTheme": "dark", "isTransparent": true, "width": "100%", "locale": "en" });
                container.appendChild(script);
                setTimeout(() => container.classList.remove('refresh-active'), 1000);
            });
        }
        window.onload = () => {
            new TradingView.widget({ "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15", "theme": "dark", "container_id": "gold_chart", "hide_top_toolbar": true });
            new TradingView.widget({ "autosize": true, "symbol": "FX:AUDUSD", "interval": "15", "theme": "dark", "container_id": "aud_chart", "hide_top_toolbar": true });
            refreshData();
            setInterval(refreshData, 60000);
        };
    </script>
</body>
</html>
