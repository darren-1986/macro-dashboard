<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | 2026 Live Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; height: 100%; }
        .vix-number { font-size: 3.5rem; line-height: 1; letter-spacing: -3px; font-weight: 900; }
        .glow-blue { text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .bias-box { background: #1e222d; border: 1px solid #363a45; padding: 12px; border-radius: 8px; text-align: center; flex: 1; min-width: 140px; }
        .news-item { border-bottom: 1px solid #2a2e39; padding: 12px; transition: background 0.2s; }
        .news-item:hover { background: #1e222d; }
        .news-tag { font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 4px; margin-right: 8px; text-transform: uppercase; }
    </style>
</head>
<body class="p-4 md:p-6">

    <header class="flex flex-col lg:flex-row justify-between items-start mb-6 gap-6 border-b border-gray-800 pb-6">
        <div>
            <h1 class="text-4xl font-black text-yellow-500 italic uppercase tracking-tighter">MacroPulse AI</h1>
            <p class="text-[11px] text-gray-500 font-mono tracking-widest uppercase mt-1">Institutional Terminal • Mar 06, 2026</p>
        </div>
        
        <div class="flex flex-wrap gap-3 w-full lg:w-auto">
            <div class="bias-box border-l-4 border-l-blue-500">
                <span class="text-[10px] uppercase text-gray-400 font-bold block mb-1">Risk Sentiment</span>
                <div class="text-sm font-black text-blue-400 uppercase italic">RISK-OFF / VOLATILE</div>
            </div>
            <div class="bias-box border-l-4 border-l-yellow-600">
                <span class="text-[10px] uppercase text-gray-400 font-bold block mb-1">Gold Bias</span>
                <div class="text-sm font-black text-yellow-500 uppercase">BULLISH ($5,164)</div>
            </div>
            <div class="bias-box border-l-4 border-l-orange-500">
                <span class="text-[10px] uppercase text-gray-400 font-bold block mb-1">AUD Bias</span>
                <div class="text-sm font-black text-orange-400 uppercase">WEAK (0.7031)</div>
            </div>
            <div class="bias-box border-l-4 border-l-green-500">
                <span class="text-[10px] uppercase text-gray-400 font-bold block mb-1">USA (DXY)</span>
                <div class="text-sm font-black text-green-400 uppercase">STRENGTHENING</div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-3 flex flex-col gap-6">
            <div class="widget-card p-8 border-t-4 border-t-blue-500">
                <h3 class="text-blue-400 font-black text-xs uppercase tracking-widest text-center mb-4">CBOE VIX SPOT</h3>
                <div class="flex flex-col items-center">
                    <div class="vix-number text-white glow-blue italic">21.18</div>
                    <div class="text-[11px] font-black text-red-500 mt-3 uppercase tracking-widest bg-red-950/30 px-3 py-1 rounded">Extreme Caution</div>
                </div>
            </div>
            <div class="widget-card flex-grow min-h-[400px]">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                { "colorTheme": "dark", "importanceFilter": "0,1", "currencyFilter": "USD,AUD", "width": "100%", "height": "100%" }
                </script>
            </div>
        </div>

        <div class="lg:col-span-6 flex flex-col gap-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 h-[380px]">
                <div class="widget-card" id="gold_chart"></div>
                <div class="widget-card" id="aud_chart"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 h-[350px]">
                <div class="widget-card">
                    <div class="p-2 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-yellow-500 text-center">XAU/USD Gauge</div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    { "interval": "4h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "OANDA:XAUUSD", "colorTheme": "dark" }
                    </script>
                </div>
                <div class="widget-card">
                    <div class="p-2 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-orange-400 text-center">AUD/USD Gauge</div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    { "interval": "4h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "FX:AUDUSD", "colorTheme": "dark" }
                    </script>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 widget-card min-h-[755px]">
            <div class="p-4 bg-[#1e222d] border-b border-gray-800 flex justify-between">
                <span class="text-[11px] font-black uppercase text-yellow-500">Live Wire: Macro Flow</span>
                <span class="text-[9px] text-green-500 animate-pulse">● ACTIVE</span>
            </div>
            <div id="news-feed-container" class="flex-grow overflow-y-auto">
                <div class="p-10 text-center text-xs text-gray-500">Initializing 2026 News Stream...</div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // TRADINGVIEW CHARTS
        window.onload = () => {
            new TradingView.widget({ "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "60", "theme": "dark", "container_id": "gold_chart", "hide_top_toolbar": true, "hide_legend": true });
            new TradingView.widget({ "autosize": true, "symbol": "FX:AUDUSD", "interval": "60", "theme": "dark", "container_id": "aud_chart", "hide_top_toolbar": true, "hide_legend": true });
            fetchNews();
        };

        // CUSTOM NEWS ENGINE (RSS Bypass)
        async function fetchNews() {
            const container = document.getElementById('news-feed-container');
            const rssUrl = encodeURIComponent('https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=2000&keywords=gold,australia,usa');
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    container.innerHTML = '';
                    data.items.forEach(item => {
                        const date = new Date(item.pubDate).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        const div = document.createElement('div');
                        div.className = 'news-item';
                        div.innerHTML = `
                            <div class="flex items-center mb-1">
                                <span class="news-tag bg-blue-900 text-blue-200">MACRO</span>
                                <span class="text-[10px] text-gray-500">${date}</span>
                            </div>
                            <a href="${item.link}" target="_blank" class="font-bold text-[13px] leading-tight hover:text-yellow-500 block">${item.title}</a>
                        `;
                        container.appendChild(div);
                    });
                }
            } catch (e) {
                container.innerHTML = '<div class="p-10 text-center text-red-500 text-xs">Feed offline. Check internet connection.</div>';
            }
        }
        // Refresh news every 2 minutes
        setInterval(fetchNews, 120000);
    </script>
</body>
</html>
