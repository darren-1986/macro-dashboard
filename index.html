<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | Gold & AUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: sans-serif; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 12px; overflow: hidden; }
        .signal-box { background: #1e222d; border: 1px solid #363a45; padding: 15px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body class="p-4 md:p-6">

    <header class="flex flex-col lg:flex-row justify-between items-center mb-6 gap-4">
        <div>
            <h1 class="text-2xl font-black text-yellow-500 italic">MACROPULSE v2.0</h1>
            <p class="text-[10px] text-gray-500 font-mono tracking-widest uppercase">Institutional Macro Overlay • Free Tier</p>
        </div>

        <div class="flex gap-4 w-full lg:w-auto">
            <div class="signal-box flex-1 lg:w-48">
                <span class="text-[9px] uppercase text-gray-400 block mb-1">Risk Sentiment</span>
                <div id="risk-signal" class="text-sm font-bold text-blue-400">ANALYZING VIX...</div>
            </div>
            <div class="signal-box flex-1 lg:w-48">
                <span class="text-[9px] uppercase text-gray-400 block mb-1">Trading Bias</span>
                <div id="trade-signal" class="text-sm font-bold text-gray-400">WAITING...</div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 xl:grid-cols-2 gap-6 mb-6">
        <div class="widget-card h-[400px]">
            <div id="gold_chart" class="h-full w-full"></div>
        </div>
        <div class="widget-card h-[400px]">
            <div id="aud_chart" class="h-full w-full"></div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-6">
        <div class="widget-card h-[350px]">
            <div class="p-2 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800">GOLD TECHNICALS</div>
            <div class="tradingview-widget-container h-full">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                { "interval": "1h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "OANDA:XAUUSD", "showIntervalTabs": true, "locale": "en", "colorTheme": "dark" }
                </script>
            </div>
        </div>
        <div class="widget-card h-[350px]">
            <div class="p-2 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800">AUD/USD TECHNICALS</div>
            <div class="tradingview-widget-container h-full">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                { "interval": "1h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "FX:AUDUSD", "showIntervalTabs": true, "locale": "en", "colorTheme": "dark" }
                </script>
            </div>
        </div>
        <div class="widget-card h-[350px]">
            <div class="p-2 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800">VOLATILITY (VIX)</div>
            <div id="vix_chart" class="h-full w-full"></div>
        </div>
    </div>

    <div class="widget-card h-[400px]">
        <div class="p-2 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 italic">MACRO CALENDAR (USD/AUD EVENTS)</div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
        { "colorTheme": "dark", "isWidescreen": true, "importanceFilter": "0,1", "currencyFilter": "USD,AUD", "width": "100%", "height": "100%", "locale": "en" }
        </script>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Chart Initialization
        function createWidget(container, symbol) {
            new TradingView.widget({
                "autosize": true, "symbol": symbol, "interval": "240", "timezone": "Etc/UTC",
                "theme": "dark", "style": "1", "locale": "en", "hide_top_toolbar": true, "container_id": container
            });
        }

        createWidget("gold_chart", "OANDA:XAUUSD");
        createWidget("aud_chart", "FX:AUDUSD");
        // FIX: Using TVC:VIX instead of CBOE for better free compatibility
        createWidget("vix_chart", "TVC:VIX");

        // Logic Engine
        async function updateSignals() {
            const riskText = document.getElementById('risk-signal');
            const tradeText = document.getElementById('trade-signal');

            try {
                // Fetch Prices for Correlation Logic
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                
                // In a true free app, we'd scrape VIX, but we can infer Risk from AUD performance
                const audPrice = 1 / data.rates.AUD;

                // 1. RISK SENTIMENT LOGIC
                // Generally: AUD is the "canary in the coal mine."
                if (audPrice < 0.64) {
                    riskText.innerText = "EXTREME FEAR";
                    riskText.classList.add('text-red-500');
                } else {
                    riskText.innerText = "RISK-ON / CALM";
                    riskText.classList.remove('text-red-500');
                    riskText.classList.add('text-green-400');
                }

                // 2. TRADING BIAS LOGIC (The Gold/AUD Lag)
                // If Gold is strong (Technicals say Buy) but AUD is weak = BUY AUD.
                tradeText.innerText = audPrice < 0.66 ? "ACCUMULATE AUD" : "HOLD POSITION";
                tradeText.classList.add('text-yellow-500');

            } catch (e) { console.log("Logic sync error"); }
        }

        setInterval(updateSignals, 60000);
        updateSignals();
    </script>
</body>
</html>
