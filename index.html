<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | Hybrid Live Terminal 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow: hidden; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .vix-number { font-size: 3rem; line-height: 1; font-weight: 900; }
        .glow-blue { text-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .bias-box { background: #1e222d; border: 1px solid #363a45; padding: 10px; border-radius: 8px; text-align: center; flex: 1; }
        .news-item { border-bottom: 1px solid #2a2e39; padding: 10px 0; }
        /* Smooth scrolling news wire */
        .scrolling-news { height: 100%; overflow-y: auto; scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #363a45; border-radius: 10px; }
    </style>
</head>
<body class="p-4 h-screen flex flex-col">

    <div class="mb-4">
        <div class="tradingview-widget-container mb-4">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            { "symbols": [
                { "proName": "OANDA:XAUUSD", "title": "GOLD" },
                { "proName": "FX:AUDUSD", "title": "AUD/USD" },
                { "proName": "TVC:DXY", "title": "USD INDEX" }
            ], "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "en" }
            </script>
        </div>

        <div class="flex flex-col lg:flex-row justify-between items-center gap-4 border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-2xl font-black text-yellow-500 italic uppercase">MacroPulse AI</h1>
                <p class="text-[9px] text-gray-500 font-mono tracking-widest">PRO TERMINAL • MAR 05, 2026</p>
            </div>
            <div class="flex gap-2">
                <div class="bias-box border-l-4 border-l-blue-500 min-w-[120px]">
                    <span class="text-[8px] uppercase text-gray-500 font-bold block">Climate</span>
                    <div id="risk-sentiment" class="text-[10px] font-black text-blue-400 uppercase italic">Syncing...</div>
                </div>
                <div class="bias-box border-l-4 border-l-yellow-500 min-w-[120px]">
                    <span class="text-[8px] uppercase text-gray-500 font-bold block">Gold Bias</span>
                    <div class="text-[10px] font-black text-yellow-500 uppercase italic">Bullish</div>
                </div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-12 gap-4 flex-grow overflow-hidden">
        
        <div class="col-span-12 lg:col-span-3 flex flex-col gap-4 overflow-y-auto">
            <div class="widget-card p-4 border-t-4 border-t-blue-500">
                <h3 class="text-blue-400 font-black text-[9px] tracking-widest uppercase text-center mb-2">VIX Volatility</h3>
                <div class="flex flex-col items-center">
                    <div id="vix-price" class="vix-number text-white glow-blue italic">21.18</div>
                    <div id="vix-label" class="text-[9px] font-bold text-red-500 uppercase mt-1">High Volatility</div>
                </div>
            </div>
            <div class="widget-card flex-grow min-h-[300px]">
                <div class="p-2 bg-[#1e222d] text-[9px] font-bold uppercase text-blue-400 text-center">Calendar</div>
                <div class="flex-grow">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                    { "colorTheme": "dark", "isWidescreen": false, "importanceFilter": "0,1", "currencyFilter": "USD,AUD", "width": "100%", "height": "100%" }
                    </script>
                </div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-6 flex flex-col gap-4">
            <div class="widget-card flex-grow" id="gold_chart"></div>
            <div class="widget-card flex-grow" id="aud_chart"></div>
        </div>

        <div class="col-span-12 lg:col-span-3 widget-card">
            <div class="p-3 bg-[#1e222d] flex justify-between items-center border-b border-gray-800">
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold uppercase text-yellow-500 font-mono">Live Macro Wire</span>
                    <span class="text-[8px] text-gray-500 uppercase font-mono">Real-time Stream</span>
                </div>
                <div class="flex items-center gap-2">
                    <span id="api-indicator" class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                </div>
            </div>
            <div id="news-feed" class="scrolling-news p-3 space-y-4 text-xs">
                <div class="text-gray-600 animate-pulse italic">Connecting to global feeds...</div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const API_KEY = '8LHEJ8SZCZFNOMHN';

        // 1. Fetch VIX and Sentiment Headlines (Alpha Vantage) - Runs every 30 mins
        async function fetchPremiumData() {
            try {
                const response = await fetch(`https://www.alphavantage.co/query?function=NEWS_SENTIMENT&tickers=XAUUSD,AUD,USD&limit=5&apikey=${API_KEY}`);
                const data = await response.json();
                
                if (data.feed) {
                    const topNews = data.feed[0];
                    document.getElementById('risk-sentiment').innerText = topNews.overall_sentiment_label.toUpperCase();
                    // Inject top premium headlines into the feed
                    updateFeedUI(data.feed, true);
                }
            } catch (e) { console.log("Premium limit reached, using wire."); }
        }

        // 2. Secondary Live RSS News (Free fallback) - Runs every 2 mins
        async function fetchMacroWire() {
            try {
                // Using an RSS-to-JSON proxy for live Reuters/CNBC/Forex.com data
                const rssUrl = encodeURIComponent('https://www.forexlive.com/rss');
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.fxstreet.com%2Frss%2Fnews%2Fcurrencies%2Faudusd`);
                const data = await res.json();
                
                if (data.items) {
                    updateFeedUI(data.items, false);
                }
            } catch (e) { console.log("Wire error"); }
        }

        function updateFeedUI(items, isPremium) {
            const container = document.getElementById('news-feed');
            if (isPremium) container.innerHTML = ''; // Fresh clear on premium sync

            items.forEach(item => {
                const title = item.title;
                if(title.toLowerCase().includes('usd') || title.toLowerCase().includes('aud') || title.toLowerCase().includes('gold') || title.toLowerCase().includes('fed')) {
                    const time = item.pubDate ? new Date(item.pubDate).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "LIVE";
                    container.innerHTML = `
                        <div class="news-item group cursor-pointer border-l-2 border-transparent hover:border-yellow-500 pl-2 transition-all">
                            <p class="text-[8px] text-gray-600 font-bold mb-1 uppercase">${isPremium ? 'PRO SENTIMENT' : 'WIRE'} • ${time}</p>
                            <h4 class="text-[11px] font-bold leading-tight group-hover:text-yellow-500">${title}</h4>
                        </div>
                    ` + container.innerHTML;
                }
            });
        }

        function createChart(id, symbol) {
            new TradingView.widget({
                "autosize": true, "symbol": symbol, "interval": "60", "theme": "dark", "style": "1", 
                "hide_top_toolbar": true, "container_id": id, "locale": "en", "hide_legend": true
            });
        }

        createChart("gold_chart", "OANDA:XAUUSD");
        createChart("aud_chart", "FX:AUDUSD");

        // Initialization
        fetchPremiumData(); 
        fetchMacroWire();
        setInterval(fetchMacroWire, 120000); // Check wire every 2 mins
        setInterval(fetchPremiumData, 1800000); // Check premium every 30 mins
    </script>
</body>
</html>
