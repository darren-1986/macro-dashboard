<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | Pure Flow Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow-y: auto; min-height: 100vh; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #060809; }
        ::-webkit-scrollbar-thumb { background: #2a2e39; border-radius: 10px; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; height: 100%; }
        .vix-number { font-size: 3.5rem; line-height: 1; letter-spacing: -3px; font-weight: 900; }
        .glow-blue { text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .bias-box { background: #1e222d; border: 1px solid #363a45; padding: 12px; border-radius: 8px; text-align: center; flex: 1; min-width: 130px; }
        /* News List Styling */
        .news-item { border-bottom: 1px solid #2a2e39; padding: 15px; transition: 0.2s; }
        .news-item:hover { background: #1c212e; }
        .news-tag { font-size: 9px; font-weight: 900; color: #eab308; background: rgba(234, 179, 8, 0.1); padding: 2px 6px; border-radius: 4px; margin-bottom: 6px; display: inline-block; text-transform: uppercase; }
        .news-title { font-size: 13px; font-weight: 600; line-height: 1.4; color: #f3f4f6; text-decoration: none; display: block; }
        .news-time { font-size: 10px; color: #6b7280; margin-top: 5px; font-mono; }
    </style>
</head>
<body class="p-4 md:p-6">

    <header class="flex flex-col lg:flex-row justify-between items-start mb-6 gap-6 border-b border-gray-800 pb-6">
        <div>
            <h1 class="text-4xl font-black text-yellow-500 italic uppercase tracking-tighter">MacroPulse AI</h1>
            <p class="text-[11px] text-gray-500 font-mono tracking-widest uppercase mt-1">Institutional Terminal • Mar 06, 2026</p>
        </div>
        
        <div class="flex flex-wrap gap-3 w-full lg:w-auto">
            <div class="bias-box border-l-4 border-l-blue-500">
                <span class="text-[10px] uppercase text-gray-400 font-bold block mb-1">Risk Sentiment</span>
                <div class="text-sm font-black text-blue-400 uppercase italic">RISK-OFF (VIX: 23.75)</div>
            </div>
            <div class="bias-box border-l-4 border-l-yellow-600">
                <span class="text-[10px] uppercase text-gray-400 font-bold block mb-1">Gold Bias</span>
                <div class="text-sm font-black text-yellow-500 uppercase">BULLISH ($5,164)</div>
            </div>
            <div class="bias-box border-l-4 border-l-orange-500">
                <span class="text-[10px] uppercase text-gray-400 font-bold block mb-1">AUD Bias</span>
                <div class="text-sm font-black text-orange-400 uppercase">WEAK (0.7031)</div>
            </div>
            <div class="bias-box border-l-4 border-l-green-500">
                <span class="text-[10px] uppercase text-gray-400 font-bold block mb-1">USA (DXY)</span>
                <div class="text-sm font-black text-green-400 uppercase">STRENGTHENING</div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 pb-12">
        
        <div class="lg:col-span-3 flex flex-col gap-6">
            <div class="widget-card p-8 border-t-4 border-t-blue-500">
                <h3 class="text-blue-400 font-black text-xs uppercase tracking-widest text-center mb-4">CBOE VIX SPOT</h3>
                <div class="vix-number text-white glow-blue italic text-center">23.75</div>
            </div>
            <div class="widget-card flex-grow min-h-[400px]">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                { "colorTheme": "dark", "importanceFilter": "0,1", "currencyFilter": "USD,AUD", "width": "100%", "height": "100%" }
                </script>
            </div>
        </div>

        <div class="lg:col-span-6 flex flex-col gap-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 h-[380px]">
                <div class="widget-card" id="gold_chart"></div>
                <div class="widget-card" id="aud_chart"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 h-[350px]">
                <div class="widget-card" id="gold_gauge"></div>
                <div class="widget-card" id="aud_gauge"></div>
            </div>
        </div>

        <div class="lg:col-span-3 widget-card min-h-[755px]">
            <div class="p-4 bg-[#1e222d] border-b border-gray-800 flex justify-between items-center">
                <span class="text-[11px] font-black uppercase text-yellow-500 italic">Live Macro Feed</span>
                <span id="sync-status" class="text-[9px] text-green-500 font-bold animate-pulse">● SYNCED</span>
            </div>
            <div id="live-news-stream" class="flex-grow overflow-y-auto bg-[#131722]">
                <div class="p-10 text-center text-xs text-gray-600 italic">Initializing Macro Stream...</div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // LOAD CHARTS
        window.onload = () => {
            new TradingView.widget({ "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "60", "theme": "dark", "container_id": "gold_chart", "hide_top_toolbar": true, "hide_legend": true });
            new TradingView.widget({ "autosize": true, "symbol": "FX:AUDUSD", "interval": "60", "theme": "dark", "container_id": "aud_chart", "hide_top_toolbar": true, "hide_legend": true });
            
            // TECHNIAL GAUGES (Switched to ID for reliability)
            const gaugeConfig = (s) => ({ "interval": "4h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": s, "colorTheme": "dark" });
            fetchNews(); 
        };

        // THE NATIVE NEWS SCRAPER (Bypasses Login/Iframe issues)
        async function fetchNews() {
            const container = document.getElementById('live-news-stream');
            const status = document.getElementById('sync-status');
            
            // Using a public RSS-to-JSON bridge to avoid CORS
            const feedUrl = encodeURIComponent('https://www.dailyforex.com/rss/market-news/fundamental-analysis');
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${feedUrl}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.status === 'ok') {
                    container.innerHTML = '';
                    data.items.forEach(item => {
                        // Filter for Gold, Australia, and USA keywords
                        if (item.title.match(/Gold|XAU|AUD|Australia|USD|Federal Reserve|Fed|Treasury|RBA/i)) {
                            const newsDiv = document.createElement('div');
                            newsDiv.className = 'news-item';
                            newsDiv.innerHTML = `
                                <span class="news-tag">Macro Alert</span>
                                <a href="${item.link}" target="_blank" class="news-title">${item.title}</a>
                                <div class="news-time">${new Date(item.pubDate).toLocaleTimeString()} • ${item.author || 'DailyForex'}</div>
                            `;
                            container.appendChild(newsDiv);
                        }
                    });
                    if (container.innerHTML === '') {
                        container.innerHTML = '<div class="p-10 text-center text-xs text-gray-500">No active alerts for Gold/AUD/USA in this hour.</div>';
                    }
                }
            } catch (e) {
                status.innerText = "● OFFLINE";
                status.classList.replace('text-green-500', 'text-red-500');
                container.innerHTML = '<div class="p-10 text-center text-xs text-red-400">Sync Error. Retrying in 60s...</div>';
            }
        }
        
        // Auto-refresh every 2 minutes
        setInterval(fetchNews, 120000);
    </script>
</body>
</html>
