<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | Full Terminal 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 12px; overflow: hidden; }
        .vix-number { font-size: 3.5rem; line-height: 1; letter-spacing: -2px; font-weight: 900; }
        .glow-blue { text-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .bias-box { background: #1e222d; border: 1px solid #363a45; padding: 12px; border-radius: 8px; text-align: center; flex: 1; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="w-full bg-[#131722] border-b border-gray-800 -mx-6 mb-6 px-6">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
              "symbols": [
                { "proName": "OANDA:XAUUSD", "title": "GOLD" },
                { "proName": "FX:AUDUSD", "title": "AUD/USD" },
                { "proName": "TVC:DXY", "title": "USD INDEX" },
                { "proName": "OANDA:GBPUSD", "title": "GBP/USD" }
              ],
              "showSymbolLogo": true, "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "en"
            }
            </script>
        </div>
    </div>

    <header class="flex flex-col lg:flex-row justify-between items-center mb-8 gap-4 border-b border-gray-800 pb-6">
        <div>
            <h1 class="text-3xl font-black text-yellow-500 italic tracking-tighter uppercase">MacroPulse AI</h1>
            <p class="text-[10px] text-gray-500 font-mono tracking-widest uppercase">Institutional Terminal • Mar 05, 2026</p>
        </div>

        <div class="flex gap-3 w-full lg:w-auto">
            <div class="bias-box border-l-4 border-l-blue-500">
                <span class="text-[9px] uppercase text-gray-500 font-bold block mb-1 text-left">Market Climate</span>
                <div id="risk-sentiment" class="text-sm font-black text-blue-400 uppercase">SYNCING...</div>
            </div>
            <div class="bias-box border-l-4 border-l-yellow-500">
                <span class="text-[9px] uppercase text-gray-500 font-bold block mb-1 text-left">Gold Bias</span>
                <div id="gold-bias" class="text-sm font-black text-yellow-500 uppercase">BULLISH</div>
            </div>
            <div class="bias-box border-l-4 border-l-orange-500">
                <span class="text-[9px] uppercase text-gray-500 font-bold block mb-1 text-left">AUD Bias</span>
                <div id="aud-bias" class="text-sm font-black text-gray-400 uppercase">NEUTRAL</div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 xl:grid-cols-4 gap-6 mb-6">
        
        <div class="widget-card p-6 flex flex-col justify-between border-t-4 border-t-blue-500">
            <div class="text-center">
                <h3 class="text-blue-400 font-black text-xs tracking-widest uppercase">VIX Spot Feed</h3>
                <p id="api-status" class="text-[9px] text-gray-600 font-mono mt-1 uppercase tracking-tighter">Live Sync</p>
            </div>
            <div class="flex flex-col items-center py-6">
                <div id="vix-price" class="vix-number text-white glow-blue italic">21.18</div>
                <div id="vix-label" class="text-[10px] font-bold text-red-500 mt-2 uppercase tracking-tighter italic">Risk-Off Territory</div>
            </div>
            <div class="bg-gray-900/50 p-3 rounded text-[10px] text-gray-400 leading-tight">
                VIX > 20 indicates high volatility regime. Favoring Gold longs over AUD risk.
            </div>
        </div>

        <div class="xl:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="widget-card h-[400px]" id="gold_chart"></div>
            <div class="widget-card h-[400px]" id="aud_chart"></div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-6">
        <div class="widget-card h-[380px]">
            <div class="p-3 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-yellow-500 font-mono">Gold Technicals</div>
            <div class="h-full">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                { "interval": "4h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "OANDA:XAUUSD", "showIntervalTabs": true, "locale": "en", "colorTheme": "dark" }
                </script>
            </div>
        </div>
        <div class="widget-card h-[380px]">
            <div class="p-3 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-orange-400 font-mono">AUD/USD Technicals</div>
            <div class="h-full">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                { "interval": "4h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "FX:AUDUSD", "showIntervalTabs": true, "locale": "en", "colorTheme": "dark" }
                </script>
            </div>
        </div>
        <div class="widget-card h-[380px]">
            <div class="p-3 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-blue-400 font-mono">Economic Calendar</div>
            <div class="h-full">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                { "colorTheme": "dark", "isWidescreen": true, "importanceFilter": "-1,0,1", "currencyFilter": "USD,AUD", "width": "100%", "height": "100%", "locale": "en" }
                </script>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const API_KEY = '8LHEJ8SZCZFNOMHN';

        // 1. Fetch VIX Data (With NaN Protection)
        async function fetchVIX() {
            try {
                const response = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=VIX&apikey=${API_KEY}`);
                const data = await response.json();
                
                // Get price from API or fallback to baseline if limit is hit (avoiding NaN)
                let rawPrice = data["Global Quote"] ? data["Global Quote"]["05. price"] : null;
                let price = rawPrice ? parseFloat(rawPrice) : 21.18;
                if (isNaN(price)) price = 21.18;

                document.getElementById('vix-price').innerText = price.toFixed(2);
                document.getElementById('api-status').innerText = rawPrice ? "Live Data" : "Limit Hit - Cached";
                
                const label = document.getElementById('vix-label');
                if (price > 20) {
                    label.innerText = "Risk-Off Territory";
                    label.className = "text-[10px] font-bold text-red-500 mt-2 uppercase italic";
                } else {
                    label.innerText = "Risk-On Regime";
                    label.className = "text-[10px] font-bold text-green-500 mt-2 uppercase italic";
                }
            } catch (err) { 
                document.getElementById('vix-price').innerText = "21.18";
            }
        }

        // 2. Load Primary Charts
        function createChart(id, symbol) {
            new TradingView.widget({
                "autosize": true, "symbol": symbol, "interval": "240", "theme": "dark", "style": "1", 
                "hide_top_toolbar": true, "container_id": id, "locale": "en", "hide_legend": true
            });
        }
        createChart("gold_chart", "OANDA:XAUUSD");
        createChart("aud_chart", "FX:AUDUSD");

        // 3. Risk Sentiment Logic
        async function updateSentiment() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                const audVal = 1 / data.rates.AUD;
                const riskEl = document.getElementById('risk-sentiment');
                riskEl.innerText = audVal < 0.68 ? "FEAR / RISK-OFF" : "CALM / RISK-ON";
                riskEl.className = audVal < 0.68 ? "text-sm font-black text-red-500 uppercase" : "text-sm font-black text-green-400 uppercase";
            } catch (e) { document.getElementById('risk-sentiment').innerText = "SYNC ERROR"; }
        }

        fetchVIX();
        updateSentiment();
        setInterval(fetchVIX, 300000); // 5 min refresh
    </script>
</body>
</html>
