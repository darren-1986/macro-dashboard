<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MacroPulse AI | Integrated Indicator Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 8px; overflow: hidden; height: 320px; }
        .header-stat { background: #1e222d; border: 1px solid #363a45; padding: 10px; border-radius: 6px; min-width: 140px; }
    </style>
</head>
<body class="p-4">

    <header class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
        <div class="flex gap-4">
            <div class="header-stat border-l-4 border-yellow-500">
                <span class="text-[10px] uppercase text-gray-500 font-bold">Gold/AUD Ratio</span>
                <div id="ratio-val" class="text-lg font-black text-yellow-500">Calculating...</div>
            </div>
            <div class="header-stat border-l-4 border-blue-500">
                <span class="text-[10px] uppercase text-gray-500 font-bold">USD Correlation</span>
                <div id="corr-val" class="text-lg font-black text-blue-400">Stable</div>
            </div>
        </div>
        <div class="text-right">
            <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">MacroPulse <span class="text-yellow-500">v3.0</span></h1>
            <p class="text-[9px] text-gray-500 font-mono">INTEGRATED ENGINE ACTIVE</p>
        </div>
    </header>

    <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-2">
            <span class="text-[10px] font-bold text-gray-400 uppercase ml-2">XAUUSD + Sentiment Oscillator</span>
            <div id="gold-integrated" class="widget-card"></div>
        </div>

        <div class="flex flex-col gap-2">
            <span class="text-[10px] font-bold text-gray-400 uppercase ml-2">AUDUSD + DXY Delta</span>
            <div id="aud-integrated" class="widget-card"></div>
        </div>
    </div>

    <script>
        // CORE CHART ENGINE
        const chartOptions = { 
            layout: { backgroundColor: '#131722', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#2a2e39' }, horzLines: { color: '#2a2e39' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            timeScale: { borderColor: '#2a2e39' }
        };

        const goldChart = LightweightCharts.createChart(document.getElementById('gold-integrated'), chartOptions);
        const audChart = LightweightCharts.createChart(document.getElementById('aud-integrated'), chartOptions);

        const goldSeries = goldChart.addAreaSeries({ lineColor: '#eab308', topColor: 'rgba(234, 179, 8, 0.4)', bottomColor: 'rgba(234, 179, 8, 0)' });
        const audSeries = audChart.addAreaSeries({ lineColor: '#3b82f6', topColor: 'rgba(59, 130, 246, 0.4)', bottomColor: 'rgba(59, 130, 246, 0)' });

        // INTEGRATED INDICATOR: Sentiment Histogram (Bottom of Chart)
        const sentimentIndicator = goldChart.addHistogramSeries({
            color: '#ef4444',
            priceFormat: { type: 'volume' },
            priceScaleId: 'sentiment',
        });

        goldChart.priceScale('sentiment').applyOptions({
            scaleMargins: { top: 0.8, bottom: 0 },
        });

        // SIMULATED DATA FEED & CALCULATION ENGINE
        function updateIntegratedLogic() {
            const now = Math.floor(Date.now() / 1000);
            const mockGold = 5080 + Math.random() * 10;
            const mockAud = 0.7030 + Math.random() * 0.001;
            
            // CUSTOM CALCULATION: Gold / AUD Ratio
            const ratio = (mockGold / (mockAud * 1000)).toFixed(3);
            document.getElementById('ratio-val').innerText = ratio;

            goldSeries.update({ time: now, value: mockGold });
            audSeries.update({ time: now, value: mockAud });

            // UPDATE INTEGRATED INDICATOR
            sentimentIndicator.update({
                time: now,
                value: Math.random() * 100,
                color: mockGold > 5085 ? '#22c55e' : '#ef4444'
            });
        }

        setInterval(updateIntegratedLogic, 3000);
        updateIntegratedLogic();
    </script>
</body>
</html>
