<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | Final 2026 Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .vix-number { font-size: 3rem; line-height: 1; letter-spacing: -2px; font-weight: 900; }
        .glow-blue { text-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .bias-box { background: #1e222d; border: 1px solid #363a45; padding: 10px; border-radius: 8px; text-align: center; flex: 1; }
        .news-item { border-bottom: 1px solid #2a2e39; padding: 12px 0; transition: background 0.2s; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #363a45; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="mb-6 px-4">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            { "symbols": [
                { "proName": "OANDA:XAUUSD", "title": "GOLD" },
                { "proName": "FX:AUDUSD", "title": "AUD/USD" },
                { "proName": "TVC:DXY", "title": "USD INDEX" }
            ], "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "en" }
            </script>
        </div>
    </div>

    <header class="flex flex-col lg:flex-row justify-between items-center mb-6 gap-4 border-b border-gray-800 pb-6">
        <div>
            <h1 class="text-3xl font-black text-yellow-500 italic uppercase">MacroPulse AI</h1>
            <p class="text-[10px] text-gray-500 font-mono tracking-widest uppercase">Institutional Terminal • Mar 05, 2026</p>
        </div>
        <div class="flex gap-3 w-full lg:w-auto">
            <div class="bias-box border-l-4 border-l-blue-500">
                <span class="text-[9px] uppercase text-gray-500 font-bold block mb-1 text-left">Market Climate</span>
                <div id="risk-sentiment" class="text-xs font-black text-blue-400 uppercase italic">CALCULATING...</div>
            </div>
            <div class="bias-box border-l-4 border-l-yellow-500">
                <span class="text-[9px] uppercase text-gray-500 font-bold block mb-1 text-left">Gold Bias</span>
                <div class="text-xs font-black text-yellow-500 uppercase">BULLISH</div>
            </div>
            <div class="bias-box border-l-4 border-l-orange-500">
                <span class="text-[9px] uppercase text-gray-500 font-bold block mb-1 text-left">AUD Bias</span>
                <div id="aud-bias" class="text-xs font-black text-orange-400 uppercase">NEUTRAL</div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-3 flex flex-col gap-6">
            <div class="widget-card p-6 border-t-4 border-t-blue-500">
                <h3 class="text-blue-400 font-black text-[10px] uppercase text-center mb-2">VIX Index</h3>
                <div class="flex flex-col items-center">
                    <div id="vix-price" class="vix-number text-white glow-blue italic">--.--</div>
                    <div id="vix-label" class="text-[10px] font-bold text-gray-500 mt-2 uppercase">Syncing...</div>
                </div>
            </div>
            <div class="widget-card h-[450px]">
                <div class="p-3 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-blue-400">Economic Events</div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                { "colorTheme": "dark", "importanceFilter": "-1,0,1", "currencyFilter": "USD,AUD", "width": "100%", "height": "100%", "locale": "en" }
                </script>
            </div>
        </div>

        <div class="lg:col-span-6 flex flex-col gap-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="widget-card h-[350px]" id="gold_chart"></div>
                <div class="widget-card h-[350px]" id="aud_chart"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="widget-card h-[350px]">
                    <div class="p-2 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-yellow-500 text-center">Gold Gauge</div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    { "interval": "4h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "OANDA:XAUUSD", "colorTheme": "dark" }
                    </script>
                </div>
                <div class="widget-card h-[350px]">
                    <div class="p-2 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-orange-400 text-center">AUD Gauge</div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    { "interval": "4h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "FX:AUDUSD", "colorTheme": "dark" }
                    </script>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 widget-card h-[755px]">
            <div class="p-4 bg-[#1e222d] flex justify-between items-center border-b border-gray-800">
                <div>
                    <span class="text-[10px] font-bold uppercase text-yellow-500">Macro Intelligence</span>
                    <span class="text-[8px] text-gray-500 uppercase block">USD • AUD • GOLD</span>
                </div>
                <span class="animate-pulse w-2 h-2 bg-red-500 rounded-full"></span>
            </div>
            <div id="news-feed" class="overflow-y-auto p-4 flex-grow space-y-4">
                <div class="text-gray-500 text-xs animate-pulse italic">Connecting to stream...</div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const API_KEY = '8LHEJ8SZCZFNOMHN';

        async function updateVIX() {
            try {
                const res = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=VIX&apikey=${API_KEY}`);
                const data = await res.json();
                if (data["Global Quote"]) {
                    const price = parseFloat(data["Global Quote"]["05. price"]) || 21.50;
                    document.getElementById('vix-price').innerText = price.toFixed(2);
                    document.getElementById('vix-label').innerText = price > 20 ? "Risk-Off" : "Risk-On";
                    document.getElementById('vix-label').className = price > 20 ? "text-[10px] font-bold text-red-500 mt-2 uppercase italic" : "text-[10px] font-bold text-green-400 mt-2 uppercase italic";
                    document.getElementById('risk-sentiment').innerText = price > 20 ? "CAUTION / RISK-OFF" : "STABLE / RISK-ON";
                }
            } catch (e) { console.error("VIX Error"); }
        }

        async function updateNews() {
            try {
                // Fetching via Sentiment News API which is the most reliable for AlphaVantage
                const res = await fetch(`https://www.alphavantage.co/query?function=NEWS_SENTIMENT&tickers=XAUUSD,AUD,USD&limit=15&apikey=${API_KEY}`);
                const data = await res.json();
                const container = document.getElementById('news-feed');
                
                if (data.feed) {
                    container.innerHTML = '';
                    data.feed.forEach(item => {
                        const sentiment = item.overall_sentiment_label || "Neutral";
                        const color = sentiment.includes('Bullish') ? 'text-green-500' : (sentiment.includes('Bearish') ? 'text-red-500' : 'text-gray-400');
                        container.innerHTML += `
                            <div class="news-item">
                                <a href="${item.url}" target="_blank">
                                    <p class="text-[8px] text-gray-600 font-bold mb-1 uppercase">${item.source} • <span class="${color}">${sentiment}</span></p>
                                    <h4 class="text-[11px] font-bold leading-tight hover:text-yellow-500">${item.title}</h4>
                                </a>
                            </div>`;
                    });
                }
            } catch (e) { console.error("News Error"); }
        }

        function createChart(id, symbol) {
            new TradingView.widget({
                "autosize": true, "symbol": symbol, "interval": "60", "theme": "dark", "style": "1", 
                "hide_top_toolbar": true, "container_id": id, "locale": "en", "hide_legend": true
            });
        }

        createChart("gold_chart", "OANDA:XAUUSD");
        createChart("aud_chart", "FX:AUDUSD");
        
        // Run updates
        updateVIX();
        updateNews();
        
        // Slower interval to prevent "Limit Hit"
        setInterval(updateVIX, 300000); // 5 mins
        setInterval(updateNews, 900000); // 15 mins
    </script>
</body>
</html>
