<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | Compact HUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; height: 100%; }
        .bias-box { background: #1e222d; border: 1px solid #363a45; padding: 8px 12px; border-radius: 8px; text-align: center; flex: 1; min-width: 120px; }
        .vix-badge { background: linear-gradient(90deg, #450a0a 0%, #1e222d 100%); border: 1px solid #7f1d1d; }
        .vix-glow { text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body class="p-4 md:p-6">

    <header class="sticky top-0 z-50 bg-[#060809]/95 backdrop-blur-md flex flex-col xl:flex-row justify-between items-center mb-6 gap-4 border-b border-gray-800 pb-4 pt-2">
        <div class="flex items-center gap-4 w-full xl:w-auto">
            <div>
                <h1 class="text-2xl font-black text-yellow-500 italic uppercase tracking-tighter leading-none">MacroPulse AI</h1>
                <p class="text-[9px] text-gray-500 font-mono tracking-widest uppercase">Institutional Terminal</p>
            </div>
            
            <div class="vix-badge flex items-center gap-3 px-4 py-2 rounded-lg border-l-4 border-l-red-600">
                <div class="text-left">
                    <span class="text-[9px] uppercase text-gray-400 font-bold block leading-none">CBOE VIX SPOT</span>
                    <div id="vix-val" class="text-xl font-black text-red-500 vix-glow italic">23.75</div>
                </div>
                <div class="h-8 w-[1px] bg-gray-700"></div>
                <div class="text-left">
                    <span id="sentiment-tag" class="text-[10px] font-black uppercase text-red-400 animate-pulse block">Risk-Off</span>
                    <span class="text-[9px] text-gray-500 font-medium uppercase leading-none">Elevated Fear</span>
                </div>
            </div>
        </div>
        
        <div class="flex flex-wrap gap-2 w-full xl:w-auto">
            <div class="bias-box border-l-4 border-l-red-500">
                <span class="text-[9px] uppercase text-gray-400 font-bold block">Sentiment</span>
                <div class="text-xs font-black text-red-500 italic uppercase">Risk-Off</div>
            </div>
            <div class="bias-box border-l-4 border-l-yellow-600">
                <span class="text-[9px] uppercase text-gray-400 font-bold block">Gold Bias</span>
                <div class="text-xs font-black text-yellow-500 italic uppercase">Bullish</div>
            </div>
            <div class="bias-box border-l-4 border-l-orange-500">
                <span class="text-[9px] uppercase text-gray-400 font-bold block">Australia</span>
                <div class="text-xs font-black text-orange-400 italic uppercase">AUD Weak</div>
            </div>
            <div class="bias-box border-l-4 border-l-green-500">
                <span class="text-[9px] uppercase text-gray-400 font-bold block">USA (DXY)</span>
                <div class="text-xs font-black text-green-400 italic uppercase">Strong</div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 pb-20">
        
        <div class="lg:col-span-3">
            <div class="widget-card h-[600px]">
                <div class="p-2 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-blue-400 text-center">Macro Events</div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                { "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%", "importanceFilter": "0,1", "currencyFilter": "USD,AUD" }
                </script>
            </div>
        </div>

        <div class="lg:col-span-6 flex flex-col gap-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 h-[350px]">
                <div id="gold_chart" class="widget-card"></div>
                <div id="aud_chart" class="widget-card"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 h-[250px]">
                <div class="widget-card">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    { "interval": "1h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "OANDA:XAUUSD", "colorTheme": "dark" }
                    </script>
                </div>
                <div class="widget-card">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    { "interval": "1h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "FX:AUDUSD", "colorTheme": "dark" }
                    </script>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 widget-card min-h-[600px]">
            <div class="p-4 bg-[#1e222d] border-b border-gray-800 flex justify-between items-center">
                <span class="text-[11px] font-black uppercase text-yellow-500 italic">Market Wire</span>
                <span class="text-[9px] text-green-500 font-bold animate-pulse uppercase">Live</span>
            </div>
            <div class="flex-grow">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                {
                  "feedMode": "all_symbols",
                  "symbolsGroups": [{"name": "Macro", "symbols": ["OANDA:XAUUSD", "FX:AUDUSD", "TVC:DXY"]}],
                  "isTransparent": true, "displayMode": "regular", "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "en"
                }
                </script>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        window.onload = () => {
            new TradingView.widget({ "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15", "theme": "dark", "container_id": "gold_chart", "hide_top_toolbar": true });
            new TradingView.widget({ "autosize": true, "symbol": "FX:AUDUSD", "interval": "15", "theme": "dark", "container_id": "aud_chart", "hide_top_toolbar": true });
        };
    </script>
</body>
</html>
