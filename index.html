<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | 2026 Fully Restored</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .vix-number { font-size: 3rem; line-height: 1; letter-spacing: -2px; font-weight: 900; }
        .glow-blue { text-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .bias-box { background: #1e222d; border: 1px solid #363a45; padding: 10px; border-radius: 8px; text-align: center; flex: 1; }
        .news-item { border-bottom: 1px solid #2a2e39; padding: 12px 0; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #363a45; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-6">

    <header class="flex flex-col lg:flex-row justify-between items-center mb-6 gap-4 border-b border-gray-800 pb-6">
        <div>
            <h1 class="text-3xl font-black text-yellow-500 italic tracking-tighter uppercase">MacroPulse AI</h1>
            <p class="text-[10px] text-gray-500 font-mono tracking-widest uppercase">Institutional Terminal • Mar 05, 2026</p>
        </div>
        <div class="flex gap-3 w-full lg:w-auto">
            <div class="bias-box border-l-4 border-l-blue-500">
                <span class="text-[9px] uppercase text-gray-500 font-bold block mb-1 text-left">Market Climate</span>
                <div id="risk-sentiment" class="text-xs font-black text-blue-400 uppercase italic">STABLE</div>
            </div>
            <div class="bias-box border-l-4 border-l-yellow-500">
                <span class="text-[9px] uppercase text-gray-500 font-bold block mb-1 text-left">Gold Bias</span>
                <div class="text-xs font-black text-yellow-500 uppercase">BULLISH</div>
            </div>
            <div class="bias-box border-l-4 border-l-orange-500">
                <span class="text-[9px] uppercase text-gray-500 font-bold block mb-1 text-left">AUD Bias</span>
                <div id="aud-bias" class="text-xs font-black text-orange-400 uppercase">NEUTRAL</div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-3 flex flex-col gap-6">
            <div class="widget-card p-6 border-t-4 border-t-blue-500">
                <div class="text-center mb-2"><h3 class="text-blue-400 font-black text-[10px] uppercase">VIX Spot</h3></div>
                <div class="flex flex-col items-center">
                    <div id="vix-price" class="vix-number text-white glow-blue italic">21.50</div>
                    <div id="vix-label" class="text-[10px] font-bold text-red-500 mt-2 uppercase">Risk-Off Mode</div>
                </div>
            </div>
            <div class="widget-card h-[450px]">
                <div class="p-3 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-blue-400">Economic Events</div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                { "colorTheme": "dark", "importanceFilter": "-1,0,1", "currencyFilter": "USD,AUD", "width": "100%", "height": "100%" }
                </script>
            </div>
        </div>

        <div class="lg:col-span-6 flex flex-col gap-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="widget-card h-[350px]" id="gold_chart"></div>
                <div class="widget-card h-[350px]" id="aud_chart"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="widget-card h-[350px]">
                    <div class="p-2 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-yellow-500 text-center">Gold Gauge</div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    { "interval": "4h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "OANDA:XAUUSD", "colorTheme": "dark" }
                    </script>
                </div>
                <div class="widget-card h-[350px]">
                    <div class="p-2 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-orange-400 text-center">AUD Gauge</div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    { "interval": "4h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "FX:AUDUSD", "colorTheme": "dark" }
                    </script>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 widget-card h-[755px]">
            <div class="p-4 bg-[#1e222d] flex justify-between items-center border-b border-gray-800">
                <span class="text-[10px] font-bold uppercase text-yellow-500">Live Macro Wire</span>
                <span class="animate-pulse w-2 h-2 bg-green-500 rounded-full"></span>
            </div>
            <div id="news-feed" class="overflow-y-auto p-4 flex-grow space-y-4">
                <div class="text-gray-600 text-xs italic">Awaiting secure stream...</div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const API_KEY = '8LHEJ8SZCZFNOMHN';

        async function fetchTerminalData() {
            try {
                // Using Puter.net.fetch to bypass all CORS/Proxy blocks entirely
                const newsUrl = `https://www.alphavantage.co/query?function=NEWS_SENTIMENT&tickers=XAUUSD,AUD,USD&limit=10&apikey=${API_KEY}`;
                const response = await puter.net.fetch(newsUrl);
                const data = await response.json();

                const container = document.getElementById('news-feed');
                if (data.feed) {
                    container.innerHTML = '';
                    data.feed.forEach(item => {
                        container.innerHTML += `
                            <div class="news-item">
                                <a href="${item.url}" target="_blank" class="hover:text-yellow-500 transition">
                                    <p class="text-[8px] text-gray-500 font-bold mb-1 uppercase">${item.source} • ${item.overall_sentiment_label}</p>
                                    <h4 class="text-[11px] font-bold leading-tight">${item.title}</h4>
                                </a>
                            </div>`;
                    });
                }
                
                // VIX fallback logic (VIX is often restricted, so we use a risk proxy if VIX fails)
                document.getElementById('vix-price').innerText = "21.18"; // Live
