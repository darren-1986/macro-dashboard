<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | Pure Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow-y: auto; min-height: 100vh; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #060809; }
        ::-webkit-scrollbar-thumb { background: #2a2e39; border-radius: 10px; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; height: 100%; }
        .bias-box { background: #1e222d; border: 1px solid #363a45; padding: 12px; border-radius: 8px; text-align: center; flex: 1; min-width: 130px; }
        .news-entry { border-bottom: 1px solid #2a2e39; padding: 14px; transition: 0.2s; }
        .news-entry:hover { background: #1c212e; }
        .tag { font-size: 9px; font-weight: 900; background: rgba(234, 179, 8, 0.1); color: #eab308; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
    </style>
</head>
<body class="p-4 md:p-6">

    <header class="flex flex-col lg:flex-row justify-between items-start mb-6 gap-6 border-b border-gray-800 pb-6">
        <div>
            <h1 class="text-4xl font-black text-yellow-500 italic uppercase tracking-tighter">MacroPulse AI</h1>
            <p class="text-[11px] text-gray-500 font-mono tracking-widest uppercase mt-1">Mar 06, 2026 • Live Socket Enabled</p>
        </div>
        
        <div class="flex flex-wrap gap-3 w-full lg:w-auto">
            <div class="bias-box border-l-4 border-l-blue-500">
                <span class="text-[10px] uppercase text-gray-400 font-bold block">Risk Sentiment</span>
                <div class="text-sm font-black text-blue-400 uppercase italic">RISK-OFF (VIX: 23.75)</div>
            </div>
            <div class="bias-box border-l-4 border-l-yellow-600">
                <span class="text-[10px] uppercase text-gray-400 font-bold block">Gold Bias</span>
                <div class="text-sm font-black text-yellow-500 uppercase">BULLISH ($5,164)</div>
            </div>
            <div class="bias-box border-l-4 border-l-orange-500">
                <span class="text-[10px] uppercase text-gray-400 font-bold block">AUD Bias</span>
                <div class="text-sm font-black text-orange-400 uppercase">WEAK (0.7031)</div>
            </div>
            <div class="bias-box border-l-4 border-l-green-500">
                <span class="text-[10px] uppercase text-gray-400 font-bold block">USA (DXY)</span>
                <div class="text-sm font-black text-green-400 uppercase">STRENGTHENING</div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 pb-12">
        <div class="lg:col-span-9 flex flex-col gap-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 h-[450px]">
                <div class="widget-card" id="tv_gold"></div>
                <div class="widget-card" id="tv_aud"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 h-[300px]">
                <div class="widget-card p-4 items-center justify-center">
                    <span class="text-xs font-bold text-blue-400 mb-2 uppercase">VIX Spot</span>
                    <div class="text-5xl font-black text-white italic">23.75</div>
                </div>
                <div class="widget-card" id="tv_gauge_gold"></div>
                <div class="widget-card" id="tv_gauge_aud"></div>
            </div>
        </div>

        <div class="lg:col-span-3 widget-card min-h-[770px]">
            <div class="p-4 bg-[#1e222d] border-b border-gray-800 flex justify-between items-center">
                <span class="text-[11px] font-black uppercase text-yellow-500 italic">Live Macro Flow</span>
                <span class="text-[9px] text-green-500 font-bold" id="news-timer">0s</span>
            </div>
            <div id="news-container" class="flex-grow overflow-y-auto bg-[#0d1017] text-xs">
                <div class="p-10 text-center text-gray-600">Connecting to news wire...</div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // INIT TRADINGVIEW (Reliable parts only)
        window.onload = () => {
            new TradingView.widget({ "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "60", "theme": "dark", "container_id": "tv_gold", "hide_top_toolbar": true });
            new TradingView.widget({ "autosize": true, "symbol": "FX:AUDUSD", "interval": "60", "theme": "dark", "container_id": "tv_aud", "hide_top_toolbar": true });
            
            new TradingView.widget({ "interval": "4h", "width": "100%", "height": "100%", "isTransparent": true, "symbol": "OANDA:XAUUSD", "showIntervalTabs": false, "colorTheme": "dark", "container_id": "tv_gauge_gold" });
            new TradingView.widget({ "interval": "4h", "width": "100%", "height": "100%", "isTransparent": true, "symbol": "FX:AUDUSD", "showIntervalTabs": false, "colorTheme": "dark", "container_id": "tv_gauge_aud" });
            
            fetchLiveNews();
            setInterval(fetchLiveNews, 60000); // Refresh every 60 seconds
        };

        async function fetchLiveNews() {
            const container = document.getElementById('news-container');
            const timer = document.getElementById('news-timer');
            timer.innerText = "REFRESHING...";
            
            // Fetching via allorigins to bypass CORS
            const feedUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://www.forexlive.com/feed/news');

            try {
                const response = await fetch(feedUrl);
                const rawData = await response.json();
                const parser = new DOMParser();
                const xml = parser.parseFromString(rawData.contents, "text/xml");
                const items = xml.querySelectorAll("item");
                
                container.innerHTML = '';
                let count = 0;

                items.forEach(item => {
                    const title = item.querySelector("title").textContent;
                    const link = item.querySelector("link").textContent;
                    const date = new Date(item.querySelector("pubDate").textContent).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    // Filtering for your specific needs
                    if (count < 15 && (title.match(/Gold|XAU|AUD|Australia|USD|Fed|RBA|Dollar/i))) {
                        const div = document.createElement('div');
                        div.className = 'news-entry';
                        div.innerHTML = `
                            <div class="mb-1"><span class="tag">Live Alert</span> <span class="text-[10px] text-gray-500 float-right">${date}</span></div>
                            <a href="${link}" target="_blank" class="font-bold text-gray-200 hover:text-yellow-500">${title}</a>
                        `;
                        container.appendChild(div);
                        count++;
                    }
                });
                timer.innerText = "60s";
            } catch (e) {
                container.innerHTML = '<div class="p-10 text-center text-red-500">Service busy. Retrying...</div>';
            }
        }
    </script>
</body>
</html>
