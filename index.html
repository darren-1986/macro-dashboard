<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | Deep Stability Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; height: 100%; }
        .bias-box { background: #1e222d; border: 1px solid #363a45; padding: 12px; border-radius: 8px; text-align: center; flex: 1; min-width: 140px; }
        .news-item { border-bottom: 1px solid #2a2e39; padding: 12px; transition: 0.2s; }
        .news-item:hover { background: #1c222d; }
        .news-tag { font-size: 9px; font-weight: 900; color: #eab308; background: rgba(234, 179, 8, 0.1); padding: 2px 6px; border-radius: 4px; margin-bottom: 4px; display: inline-block; text-transform: uppercase; }
    </style>
</head>
<body class="p-4 md:p-6">

    <header class="flex flex-col lg:flex-row justify-between items-start mb-6 gap-6 border-b border-gray-800 pb-6">
        <div>
            <h1 class="text-4xl font-black text-yellow-500 italic uppercase tracking-tighter">MacroPulse AI</h1>
            <p class="text-[11px] text-gray-500 font-mono tracking-widest uppercase mt-1">Mar 06, 2026 • Direct Data Stream</p>
        </div>
        
        <div class="flex flex-wrap gap-3 w-full lg:w-auto">
            <div class="bias-box border-l-4 border-l-blue-500"><span class="text-[10px] uppercase text-gray-400 font-bold block mb-1">Risk</span><div class="text-sm font-black text-blue-400 italic">RISK-OFF</div></div>
            <div class="bias-box border-l-4 border-l-yellow-600"><span class="text-[10px] uppercase text-gray-400 font-bold block mb-1">Gold</span><div class="text-sm font-black text-yellow-500 italic">BULLISH</div></div>
            <div class="bias-box border-l-4 border-l-orange-500"><span class="text-[10px] uppercase text-gray-400 font-bold block mb-1">AUD</span><div class="text-sm font-black text-orange-400 italic">WEAK</div></div>
            <div class="bias-box border-l-4 border-l-green-500"><span class="text-[10px] uppercase text-gray-400 font-bold block mb-1">USA</span><div class="text-sm font-black text-green-400 italic">STRONG</div></div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-3 flex flex-col gap-6">
            <div class="widget-card min-h-[700px]">
                <div class="p-3 bg-[#1e222d] text-[11px] font-black uppercase text-blue-400 text-center">Calendar</div>
                <div class="tradingview-widget-container flex-grow">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                    { "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%", "importanceFilter": "0,1", "currencyFilter": "USD,AUD" }
                    </script>
                </div>
            </div>
        </div>

        <div class="lg:col-span-6 flex flex-col gap-6">
            <div class="grid grid-cols-2 gap-4 h-[400px]">
                <div class="widget-card" id="c1"></div>
                <div class="widget-card" id="c2"></div>
            </div>
            <div class="grid grid-cols-2 gap-4 h-[300px]">
                <div class="widget-card" id="g1"></div>
                <div class="widget-card" id="g2"></div>
            </div>
        </div>

        <div class="lg:col-span-3 widget-card min-h-[700px]">
            <div class="p-4 bg-[#1e222d] border-b border-gray-800 flex justify-between items-center">
                <span class="text-[11px] font-black uppercase text-yellow-500 italic">Live Macro Feed</span>
                <span id="sync" class="text-[9px] text-green-500 font-bold animate-pulse">● SYNCED</span>
            </div>
            <div id="news-stream" class="flex-grow overflow-y-auto bg-[#131722] text-xs">
                <div class="p-10 text-center text-gray-600">Initializing Raw Text Stream...</div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        window.onload = () => {
            new TradingView.widget({ "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "60", "theme": "dark", "container_id": "c1", "hide_top_toolbar": true });
            new TradingView.widget({ "autosize": true, "symbol": "FX:AUDUSD", "interval": "60", "theme": "dark", "container_id": "c2", "hide_top_toolbar": true });
            new TradingView.widget({ "width": "100%", "height": "100%", "symbol": "OANDA:XAUUSD", "container_id": "g1", "colorTheme": "dark", "isTransparent": true });
            new TradingView.widget({ "width": "100%", "height": "100%", "symbol": "FX:AUDUSD", "container_id": "g2", "colorTheme": "dark", "isTransparent": true });
            
            updateNews();
            setInterval(updateNews, 60000);
        };

        async function updateNews() {
            const stream = document.getElementById('news-stream');
            const url = 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://tradingeconomics.com/rss/news.aspx');
            
            try {
                const r = await fetch(url);
                const j = await r.json();
                const doc = new DOMParser().parseFromString(j.contents, 'text/xml');
                const items = doc.querySelectorAll('item');
                stream.innerHTML = '';
                
                items.forEach(item => {
                    const title = item.querySelector('title').textContent;
                    if (title.match(/Gold|Australia|AUD|USA|USD|Fed|RBA/i)) {
                        const div = document.createElement('div');
                        div.className = 'news-item';
                        div.innerHTML = `<span class="news-tag">Macro Alert</span><br><a href="${item.querySelector('link').textContent}" target="_blank" class="font-bold hover:text-yellow-500">${title}</a>`;
                        stream.appendChild(div);
                    }
                });
            } catch (e) {
                stream.innerHTML = '<div class="p-10 text-center text-red-500">API Sync Error. Retrying...</div>';
            }
        }
    </script>
</body>
</html>
