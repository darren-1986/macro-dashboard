<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | 2026 Direct Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 12px; overflow: hidden; }
        .vix-number { font-size: 5rem; line-height: 1; letter-spacing: -3px; }
        .glow-blue { text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="flex flex-col md:flex-row justify-between items-center mb-12 border-b border-gray-800 pb-8 gap-6">
        <div>
            <h1 class="text-4xl font-black text-yellow-500 italic tracking-tighter uppercase">MacroPulse AI</h1>
            <p class="text-xs text-gray-500 font-mono tracking-widest uppercase mt-1">Direct Exchange Feed • March 05, 2026</p>
        </div>
        <div class="flex gap-4">
            <div class="bg-blue-900/20 border border-blue-500/30 px-4 py-2 rounded text-center">
                <span class="text-[9px] text-blue-400 block uppercase font-bold">API Status</span>
                <span id="api-status" class="text-xs font-black text-blue-300 uppercase italic">Verifying...</span>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="widget-card p-10 flex flex-col justify-center items-center border-t-4 border-t-blue-500 bg-gradient-to-b from-[#131722] to-[#090b11]">
            <h2 class="text-blue-400 font-black uppercase tracking-[0.2em] text-[10px] mb-6">VIX Fear Index • Direct</h2>
            
            <div id="vix-price" class="vix-number font-black text-white glow-blue mb-4">--.--</div>
            
            <div id="vix-badge" class="px-3 py-1 bg-gray-800 rounded text-[10px] font-bold uppercase mb-8 transition-colors">
                Waiting for Data
            </div>

            <div class="w-full bg-gray-900 rounded-full h-1.5 mb-6 overflow-hidden">
                <div id="vix-bar" class="bg-blue-500 h-full transition-all duration-1000" style="width: 0%"></div>
            </div>

            <div class="text-center">
                <p id="regime-text" class="text-[11px] text-gray-400 italic leading-relaxed">
                    Analyzing global volatility regimes...
                </p>
            </div>
        </div>

        <div class="widget-card h-[450px] lg:col-span-2 relative shadow-2xl">
            <div id="gold_chart" class="h-full w-full"></div>
            <div class="absolute top-5 left-5 bg-[#131722]/90 px-3 py-1.5 rounded border border-yellow-500/30">
                <span class="text-xs font-black text-yellow-500 uppercase tracking-widest italic">XAU/USD (Gold)</span>
            </div>
        </div>

    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const API_KEY = '8LHEJ8SZCZFNOMHN';

        // 1. Fetch Real VIX Data via your API Key
        async function fetchVIX() {
            try {
                // We use Alpha Vantage to get the raw CBOE VIX price
                const response = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=VIX&apikey=${API_KEY}`);
                const data = await response.json();
                
                // Fallback to confirmed Mar 5 price if API is busy
                let price = 21.18;
                if (data["Global Quote"] && data["Global Quote"]["05. price"]) {
                    price = parseFloat(data["Global Quote"]["05. price"]);
                    document.getElementById('api-status').innerText = "DATA SYNCED";
                } else {
                    document.getElementById('api-status').innerText = "USING MAR-05 BASE";
                }
                
                // Update UI
                const priceEl = document.getElementById('vix-price');
                const badgeEl = document.getElementById('vix-badge');
                const barEl = document.getElementById('vix-bar');
                const regimeEl = document.getElementById('regime-text');

                priceEl.innerText = price.toFixed(2);
                barEl.style.width = Math.min((price / 50) * 100, 100) + "%";

                if (price > 20) {
                    badgeEl.innerText = "RISK-OFF REGIME";
                    badgeEl.className = "px-3 py-1 bg-red-900/40 text-red-400 border border-red-500/30 rounded text-[10px] font-bold uppercase mb-8";
                    regimeEl.innerHTML = "VIX > 20: Anxiety level high. <b class='text-yellow-500'>GOLD</b> is the primary safe-haven play.";
                } else {
                    badgeEl.innerText = "RISK-ON REGIME";
                    badgeEl.className = "px-3 py-1 bg-green-900/40 text-green-400 border border-green-500/30 rounded text-[10px] font-bold uppercase mb-8";
                    regimeEl.innerHTML = "VIX < 20: Market calm. Favoring high-beta assets like <b class='text-orange-400'>AUD/USD</b>.";
                }

            } catch (err) {
                console.error("API Connection Failed");
                document.getElementById('vix-price').innerText = "21.18";
                document.getElementById('api-status').innerText = "OFFLINE (MAR-05 CACHE)";
            }
        }

        // 2. Load Gold Chart
        new TradingView.widget({
            "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "60", "theme": "dark", "style": "1",
            "container_id": "gold_chart", "hide_top_toolbar": true, "hide_legend": true, "toolbar_bg": "#131722"
        });

        // Run
        fetchVIX();
        setInterval(fetchVIX, 300000); // Check every 5 mins (to save API credits)
    </script>
</body>
</html>
