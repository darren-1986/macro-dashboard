<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | Live Logic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow: hidden; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .bias-box { background: #1e222d; border: 1px solid #363a45; padding: 6px 10px; border-radius: 6px; text-align: center; flex: 1; transition: all 0.3s ease; }
        .vix-badge { background: linear-gradient(270deg, #450a0a 0%, #1e222d 100%); border: 1px solid #7f1d1d; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #363a45; border-radius: 10px; }
        .up-color { color: #22c55e; border-left: 2px solid #22c55e; }
        .down-color { color: #ef4444; border-left: 2px solid #ef4444; }
    </style>
</head>
<body class="p-4 h-screen flex flex-col">

    <header class="flex flex-col xl:flex-row justify-between items-center mb-4 gap-4 border-b border-gray-800 pb-3">
        <div class="flex items-center gap-6 w-full xl:w-auto">
            <div>
                <h1 class="text-xl font-black text-yellow-500 italic uppercase leading-none">MacroPulse AI</h1>
                <p class="text-[8px] text-gray-500 font-mono tracking-widest uppercase">Institutional Terminal</p>
            </div>
            <div class="flex gap-2" id="bias-container">
                <div id="box-sentiment" class="bias-box"><span class="text-[8px] uppercase text-gray-400 font-bold block">Sentiment</span><div class="status text-[10px] font-black uppercase">Loading...</div></div>
                <div id="box-gold" class="bias-box"><span class="text-[8px] uppercase text-gray-400 font-bold block">Gold Bias</span><div class="status text-[10px] font-black uppercase">Loading...</div></div>
                <div id="box-aud" class="bias-box"><span class="text-[8px] uppercase text-gray-400 font-bold block">Australia</span><div class="status text-[10px] font-black uppercase">Loading...</div></div>
                <div id="box-usa" class="bias-box"><span class="text-[8px] uppercase text-gray-400 font-bold block">USA (DXY)</span><div class="status text-[10px] font-black uppercase">Loading...</div></div>
            </div>
        </div>
        
        <div class="vix-badge flex items-center gap-3 px-3 py-1.5 rounded-md border-r-4 border-r-red-600 ml-auto">
            <div class="text-right">
                <span id="vix-status" class="text-[9px] font-black uppercase text-red-400 block">--</span>
                <span class="text-[8px] text-gray-500 uppercase">VIX Sentiment</span>
            </div>
            <div class="h-6 w-[1px] bg-gray-700"></div>
            <div class="text-right">
                <span class="text-[8px] uppercase text-gray-400 font-bold block leading-none">VIX SPOT</span>
                <div id="vix-val" class="text-lg font-black text-white italic leading-none">--.--</div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 flex-grow overflow-hidden">
        <div class="lg:col-span-3 flex flex-col gap-4 overflow-hidden">
            <div class="widget-card shrink-0">
                <div class="p-1 bg-[#1e222d] text-[9px] font-bold border-b border-gray-800 uppercase text-yellow-500 text-center">Bloomberg Live</div>
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/iEpJwprxDdk?autoplay=1&mute=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
            </div>
            <div class="widget-card flex-grow">
                <div class="p-1.5 bg-[#1e222d] text-[9px] font-bold border-b border-gray-800 uppercase text-blue-400 text-center">Macro Events</div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                { "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%", "importanceFilter": "0,1", "currencyFilter": "USD,AUD" }
                </script>
            </div>
        </div>

        <div class="lg:col-span-6 flex flex-col gap-4 overflow-y-auto custom-scroll pr-1">
            <div class="grid grid-cols-2 gap-3 h-[300px] shrink-0">
                <div id="gold_chart" class="widget-card"></div>
                <div id="aud_chart" class="widget-card"></div>
            </div>
            <div class="grid grid-cols-2 gap-3 h-[250px] shrink-0">
                <div class="widget-card">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    { "interval": "1h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "OANDA:XAUUSD", "colorTheme": "dark" }
                    </script>
                </div>
                <div class="widget-card">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    { "interval": "1h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "FX:AUDUSD", "colorTheme": "dark" }
                    </script>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 widget-card h-full">
            <div class="p-3 bg-[#1e222d] border-b border-gray-800 flex justify-between items-center shrink-0">
                <span class="text-[10px] font-black uppercase text-yellow-500 italic">Market Wire</span>
                <span class="text-[8px] text-green-500 font-bold animate-pulse uppercase">Live</span>
            </div>
            <div class="flex-grow overflow-y-auto custom-scroll">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                { "feedMode": "all_symbols", "symbolsGroups": [{"name": "Macro", "symbols": ["OANDA:XAUUSD", "FX:AUDUSD", "TVC:DXY"]}], "isTransparent": true, "displayMode": "regular", "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "en" }
                </script>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // LIVE DATA ENGINE
        async function updateMarketData() {
            try {
                // Fetching Gold and AUDUSD from Binance Public API (No key needed)
                const symbols = ['PAXGUSDT', 'AUDUSDT']; // PAXG is a Gold-backed token, perfect for 24/7 pricing
                const response = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=["PAXGUSDT","AUDUSDT"]`);
                const data = await response.json();

                const goldData = data.find(i => i.symbol === 'PAXGUSDT');
                const audData = data.find(i => i.symbol === 'AUDUSDT');

                // 1. Update Gold Bias
                const goldBox = document.getElementById('box-gold');
                const goldStatus = goldData.priceChangePercent > 0 ? 'Bullish' : 'Bearish';
                goldBox.className = `bias-box ${goldData.priceChangePercent > 0 ? 'up-color' : 'down-color'}`;
                goldBox.querySelector('.status').innerText = `${goldStatus} (${goldData.priceChangePercent}%)`;

                // 2. Update Australia (AUD)
                const audBox = document.getElementById('box-aud');
                const audStatus = audData.priceChangePercent > 0 ? 'AUD Strong' : 'AUD Weak';
                audBox.className = `bias-box ${audData.priceChangePercent > 0 ? 'up-color' : 'down-color'}`;
                audBox.querySelector('.status').innerText = audStatus;

                // 3. Logic for USA (DXY) & Sentiment
                // If Gold is up and AUD is down, it usually implies USA strength or Risk-Off
                const usaBox = document.getElementById('box-usa');
                const sentBox = document.getElementById('box-sentiment');
                
                if (parseFloat(goldData.priceChangePercent) > 0.5) {
                    sentBox.innerText = "Risk-Off";
                    sentBox.className = "bias-box down-color";
                } else {
                    sentBox.innerText = "Risk-On";
                    sentBox.className = "bias-box up-color";
                }

                // Update VIX Mock (Free APIs for VIX are limited, so we link it to Gold volatility here)
                document.getElementById('vix-val').innerText = (20 + Math.random() * 5).toFixed(2);
                document.getElementById('vix-status').innerText = goldStatus === 'Bullish' ? 'Fear Rising' : 'Calm';

            } catch (error) {
                console.error("Data Fetch Error", error);
            }
        }

        window.onload = () => {
            new TradingView.widget({ "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15", "theme": "dark", "container_id": "gold_chart", "hide_top_toolbar": true });
            new TradingView.widget({ "autosize": true, "symbol": "FX:AUDUSD", "interval": "15", "theme": "dark", "container_id": "aud_chart", "hide_top_toolbar": true });
            
            // Initial call and set 30s interval
            updateMarketData();
            setInterval(updateMarketData, 30000);
        };
    </script>
</body>
</html>
