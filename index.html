<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | 2026 Live Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow: hidden; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .bias-wrapper { height: 50px; min-width: 130px; background: #1e222d; border-radius: 6px; border: 1px solid #363a45; overflow: hidden; position: relative; }
        .vix-badge { background: linear-gradient(270deg, #450a0a 0%, #1e222d 100%); border: 1px solid #7f1d1d; height: 50px; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #363a45; border-radius: 10px; }
        .update-flash { position: absolute; top: 4px; right: 4px; width: 4px; height: 4px; background: #22c55e; border-radius: 50%; display: none; }
    </style>
</head>
<body class="p-4 h-screen flex flex-col">

    <header class="flex flex-col xl:flex-row justify-between items-center mb-4 gap-4 border-b border-gray-800 pb-3">
        <div class="flex items-center gap-6 w-full xl:w-auto">
            <div>
                <h1 class="text-xl font-black text-yellow-500 italic uppercase leading-none">MacroPulse AI</h1>
                <p class="text-[8px] text-gray-500 font-mono tracking-widest uppercase">Institutional Terminal</p>
            </div>
            
            <div class="flex gap-2" id="bias-container">
                <div class="bias-wrapper" id="gold-bias">
                    <div class="update-flash"></div>
                </div>
                <div class="bias-wrapper" id="aud-bias">
                    <div class="update-flash"></div>
                </div>
                <div class="bias-wrapper" id="usa-bias">
                    <div class="update-flash"></div>
                </div>
            </div>
        </div>
        
        <div class="vix-badge flex items-center gap-3 px-3 rounded-md border-r-4 border-r-red-600 ml-auto">
            <div class="text-right">
                <span class="text-[9px] font-black uppercase text-red-400 block" id="sentiment-tag">Risk: Off</span>
                <span class="text-[8px] text-gray-500 uppercase">March 06, 2026</span>
            </div>
            <div class="h-6 w-[1px] bg-gray-700"></div>
            <div class="bias-wrapper border-none" id="vix-bias" style="min-width: 100px;"></div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 flex-grow overflow-hidden">
        <div class="lg:col-span-3 flex flex-col gap-4 overflow-hidden">
            <div class="widget-card shrink-0">
                <div class="p-1 bg-[#1e222d] text-[9px] font-bold border-b border-gray-800 uppercase text-yellow-500 text-center">Bloomberg Live</div>
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/iEpJwprxDdk?autoplay=1&mute=1" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
            <div class="widget-card flex-grow">
                <div class="p-1.5 bg-[#1e222d] text-[9px] font-bold border-b border-gray-800 uppercase text-blue-400 text-center">Macro Events</div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                { "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%", "importanceFilter": "0,1", "currencyFilter": "USD,AUD" }
                </script>
            </div>
        </div>

        <div class="lg:col-span-6 flex flex-col gap-4 overflow-y-auto custom-scroll pr-1">
            <div class="grid grid-cols-2 gap-3 h-[300px] shrink-0">
                <div id="gold_main" class="widget-card"></div>
                <div id="aud_main" class="widget-card"></div>
            </div>
            <div class="grid grid-cols-2 gap-3 h-[250px] shrink-0">
                <div class="widget-card">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    { "interval": "1h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "OANDA:XAUUSD", "colorTheme": "dark" }
                    </script>
                </div>
                <div class="widget-card">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    { "interval": "1h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "FX:AUDUSD", "colorTheme": "dark" }
                    </script>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 widget-card h-full">
            <div class="p-3 bg-[#1e222d] border-b border-gray-800 flex justify-between items-center shrink-0">
                <span class="text-[10px] font-black uppercase text-yellow-500 italic">Market Wire</span>
                <span class="text-[8px] text-green-500 font-bold animate-pulse uppercase">Live</span>
            </div>
            <div class="flex-grow overflow-y-auto custom-scroll">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                { "feedMode": "all_symbols", "symbolsGroups": [{"name": "Macro", "symbols": ["OANDA:XAUUSD", "FX:AUDUSD", "TVC:DXY"]}], "isTransparent": true, "displayMode": "regular", "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "en" }
                </script>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const biasConfigs = {
            'gold-bias': { "symbol": "OANDA:XAUUSD", "colorTheme": "dark", "isTransparent": true, "width": "100%" },
            'aud-bias': { "symbol": "FX:AUDUSD", "colorTheme": "dark", "isTransparent": true, "width": "100%" },
            'usa-bias': { "symbol": "TVC:DXY", "colorTheme": "dark", "isTransparent": true, "width": "100%" },
            'vix-bias': { "symbol": "TVC:VIX", "colorTheme": "dark", "isTransparent": true, "width": "100%" }
        };

        function refreshWidgets() {
            Object.keys(biasConfigs).forEach(id => {
                const container = document.getElementById(id);
                // Clear and Re-inject
                container.innerHTML = '<div class="update-flash" style="display:block"></div>';
                const script = document.createElement('script');
                script.type = 'text/javascript';
                script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js';
                script.async = true;
                script.innerHTML = JSON.stringify(biasConfigs[id]);
                container.appendChild(script);
            });
            
            // Brief flash to show it updated
            setTimeout(() => {
                document.querySelectorAll('.update-flash').forEach(f => f.style.display = 'none');
            }, 1000);
        }

        window.onload = () => {
            // Static Charts (Don't need 1-min refresh as they auto-stream)
            new TradingView.widget({ "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15", "theme": "dark", "container_id": "gold_main", "hide_top_toolbar": true });
            new TradingView.widget({ "autosize": true, "symbol": "FX:AUDUSD", "interval": "15", "theme": "dark", "container_id": "aud_main", "hide_top_toolbar": true });
            
            // Start Auto-Refresh Cycle for Bias Boxes
            refreshWidgets();
            setInterval(refreshWidgets, 60000); // 1 Minute
        };
    </script>
</body>
</html>
