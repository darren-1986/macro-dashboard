<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | Full Terminal Restored</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow-y: auto; min-height: 100vh; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 8px; overflow: hidden; }
        .bias-box { background: #1e222d; border: 1px solid #363a45; padding: 10px 14px; border-radius: 6px; min-width: 155px; border-left: 4px solid #374151; }
        .vix-badge { background: linear-gradient(270deg, #450a0a 0%, #1e222d 100%); border: 1px solid #7f1d1d; border-right: 4px solid #ef4444; }
        .bullish { border-left-color: #22c55e !important; }
        .bearish { border-left-color: #ef4444 !important; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .chart-box { width: 100%; height: 320px !important; max-height: 320px; }
    </style>
</head>
<body class="p-4">

    <header class="flex flex-col xl:flex-row justify-between items-center mb-4 gap-4 border-b border-gray-800 pb-4">
        <div class="flex items-center gap-8">
            <div>
                <h1 class="text-2xl font-black text-yellow-500 italic uppercase leading-none">MacroPulse AI</h1>
                <p class="text-[9px] text-gray-500 font-mono tracking-widest uppercase mt-1">Institutional Live Feed</p>
            </div>
            <div class="flex gap-3">
                <div class="bias-box bearish" id="box-sent"><span class="text-[9px] uppercase text-gray-400 font-bold block mb-1">Sentiment</span><div class="text-xs font-black uppercase text-red-500">Risk-Off</div></div>
                <div class="bias-box bullish" id="box-gold"><span class="text-[9px] uppercase text-gray-400 font-bold block mb-1">Gold Bias</span><div class="text-xs font-black uppercase text-yellow-500">Institutional Buy</div></div>
                <div class="bias-box bearish" id="box-aud"><span class="text-[9px] uppercase text-gray-400 font-bold block mb-1">Australia</span><div class="text-xs font-black uppercase text-red-400">Weak (Short)</div></div>
                <div class="bias-box" id="box-usa"><span class="text-[9px] uppercase text-gray-400 font-bold block mb-1">USA (DXY)</span><div class="text-xs font-black uppercase text-blue-400">Safe Haven Strong</div></div>
            </div>
        </div>
        <div class="vix-badge flex items-center gap-4 px-4 py-1 rounded-md">
            <div class="text-right">
                <span class="text-[10px] font-black uppercase text-red-400 block">Risk-Off</span>
                <span class="text-[9px] text-gray-500 uppercase font-mono">March 06, 2026</span>
            </div>
            <div class="h-10 w-[1px] bg-gray-700"></div>
            <div><span class="text-[9px] uppercase text-gray-400 font-bold block">CBOE VIX SPOT</span><div class="text-2xl font-black italic text-white">23.75</div></div>
        </div>
    </header>

    <div class="grid grid-cols-12 gap-4">
        <div class="col-span-3 flex flex-col gap-4">
            <div class="widget-card shrink-0">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/iEpJwprxDdk?autoplay=1&mute=1" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
            <div class="widget-card" style="height: 1000px;">
                <div class="p-2 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-blue-400 text-center">Economic Calendar</div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                { "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%", "importanceFilter": "0,1", "currencyFilter": "USD,AUD" }
                </script>
            </div>
        </div>

        <div class="col-span-6 flex flex-col gap-4">
            <div class="flex gap-4">
                <div id="chart-gold" class="widget-card w-1/2 chart-box"></div>
                <div id="chart-aud" class="widget-card w-1/2 chart-box"></div>
            </div>
            
            <div class="flex gap-4" style="height: 600px;"> 
                <div class="widget-card w-1/2 p-2">
                    <div class="p-2 text-[10px] font-bold uppercase text-gray-400 text-center">Gold Strength</div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    { "interval": "1m", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "OANDA:XAUUSD", "showIntervalTabs": false, "displayMode": "single", "locale": "en", "colorTheme": "dark" }
                    </script>
                </div>
                <div class="widget-card w-1/2 p-2">
                    <div class="p-2 text-[10px] font-bold uppercase text-gray-400 text-center">AUD/USD Strength</div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    { "interval": "1m", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "FX:AUDUSD", "showIntervalTabs": false, "displayMode": "single", "locale": "en", "colorTheme": "dark" }
                    </script>
                </div>
            </div>
        </div>

        <div class="col-span-3">
            <div class="widget-card" style="height: 1045px;">
                <div class="p-2 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-green-400 text-center">Macro News Wire</div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                { "feedMode": "all_symbols", "symbolsGroups": [{"name": "Macro", "symbols": ["OANDA:XAUUSD", "FX:AUDUSD"]}], "isTransparent": true, "displayMode": "regular", "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "en" }
                </script>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        window.onload = () => {
            // Gold Chart with RSI + Bollinger Bands Integrated
            new TradingView.widget({
                "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15", "theme": "dark", "container_id": "chart-gold",
                "hide_top_toolbar": true, "studies": ["RSI@tv-basicstudies", "BollingerBands@tv-basicstudies"]
            });
            // AUD Chart with Moving Average Cross Integrated
            new TradingView.widget({
                "autosize": true, "symbol": "FX:AUDUSD", "interval": "15", "theme": "dark", "container_id": "chart-aud",
                "hide_top_toolbar": true, "studies": ["MASimple@tv-basicstudies"]
            });
        };
    </script>
</body>
</html>
