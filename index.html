<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | Gold & AUD Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: sans-serif; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 12px; overflow: hidden; height: 450px; }
        .signal-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 border-b border-gray-800 pb-6">
        <div>
            <h1 class="text-2xl font-black text-yellow-500 tracking-tighter italic">MACROPULSE.AI</h1>
            <p class="text-xs text-gray-500 font-mono">LIVE MACRO DATA • NO-API LAYER</p>
        </div>
        
        <div id="master-signal" class="flex items-center gap-4 bg-[#131722] border border-gray-700 p-4 rounded-xl min-w-[300px]">
            <div class="flex-1">
                <span class="text-[10px] uppercase text-gray-500 font-bold block mb-1">Current Bias</span>
                <div id="signal-text" class="text-xl font-bold text-gray-300">CALIBRATING...</div>
            </div>
            <div id="signal-indicator" class="w-4 h-4 rounded-full bg-gray-600"></div>
        </div>
    </nav>

    <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
        
        <div class="xl:col-span-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="widget-card">
                    <div class="p-3 border-b border-gray-800 flex justify-between bg-[#1e222d]">
                        <span class="font-bold text-sm">GOLD (XAUUSD)</span>
                        <span class="text-yellow-500 text-xs font-mono">Real-Time</span>
                    </div>
                    <div id="gold_chart" class="h-full"></div>
                </div>
                <div class="widget-card">
                    <div class="p-3 border-b border-gray-800 flex justify-between bg-[#1e222d]">
                        <span class="font-bold text-sm">AUSTRALIAN DOLLAR (AUDUSD)</span>
                        <span class="text-blue-400 text-xs font-mono">Real-Time</span>
                    </div>
                    <div id="aud_chart" class="h-full"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="widget-card md:col-span-1">
                    <div class="p-3 border-b border-gray-800 bg-[#1e222d] font-bold text-xs uppercase text-gray-400">Fear Index (VIX)</div>
                    <div id="vix_chart" class="h-full"></div>
                </div>
                <div class="widget-card md:col-span-2">
                    <div class="p-3 border-b border-gray-800 bg-[#1e222d] font-bold text-xs uppercase text-gray-400">Technical Analysis Summary</div>
                    <div class="tradingview-widget-container">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                        {
                            "interval": "4h",
                            "width": "100%",
                            "isTransparent": true,
                            "height": "100%",
                            "symbol": "FX:AUDUSD",
                            "showIntervalTabs": true,
                            "locale": "en",
                            "colorTheme": "dark"
                        }
                        </script>
                    </div>
                </div>
            </div>
        </div>

        <div class="xl:col-span-4 space-y-6">
            <div class="widget-card !h-[924px]">
                <div class="p-3 border-b border-gray-800 bg-[#1e222d] font-bold text-xs uppercase text-gray-400 italic">High Impact Macro Events</div>
                <div id="calendar-container" class="h-full">
                    <div class="tradingview-widget-container">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                        {
                            "colorTheme": "dark",
                            "isWidescreen": false,
                            "importanceFilter": "0,1",
                            "currencyFilter": "USD,AUD",
                            "width": "100%",
                            "height": "100%",
                            "locale": "en"
                        }
                        </script>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Initialize Charts
        function createWidget(container, symbol, interval = "240") {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": interval,
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "enable_publishing": false,
                "hide_top_toolbar": true,
                "hide_legend": true,
                "save_image": false,
                "container_id": container
            });
        }

        createWidget("gold_chart", "OANDA:XAUUSD");
        createWidget("aud_chart", "FX:AUDUSD");
        createWidget("vix_chart", "CBOE:VIX", "D");

        // MACRO LOGIC ENGINE (Correlation & Volatility)
        async function runMacroCalculations() {
            const sigText = document.getElementById('signal-text');
            const sigInd = document.getElementById('signal-indicator');

            try {
                // Using a high-limit free mirror for logic
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                const audPrice = 1 / data.rates.AUD;

                // LOGIC: 
                // 1. If AUD is below 0.64 (oversold macro territory)
                // 2. If AUD/GOLD divergence occurs (Gold moves first)
                if (audPrice < 0.645) {
                    sigText.innerText = "ACCUMULATE AUD";
                    sigText.className = "text-xl font-bold text-green-500";
                    sigInd.className = "w-4 h-4 rounded-full bg-green-500 signal-pulse";
                } else if (audPrice > 0.71) {
                    sigText.innerText = "DISTRIBUTE / SELL";
                    sigText.className = "text-xl font-bold text-red-500";
                    sigInd.className = "w-4 h-4 rounded-full bg-red-500";
                } else {
                    sigText.innerText = "NEUTRAL BIAS";
                    sigText.className = "text-xl font-bold text-blue-400";
                    sigInd.className = "w-4 h-4 rounded-full bg-blue-400";
                }
            } catch (err) {
                sigText.innerText = "SYSTEM STANDBY";
            }
        }

        setInterval(runMacroCalculations, 60000);
        runMacroCalculations();
    </script>
</body>
</html>
