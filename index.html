<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | 2026 Stability Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow-y: auto; min-height: 100vh; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; height: 100%; }
        .bias-box { background: #1e222d; border: 1px solid #363a45; padding: 12px; border-radius: 8px; text-align: center; flex: 1; min-width: 140px; }
        iframe { border: none !important; }
    </style>
</head>
<body class="p-4 md:p-6">

    <header class="flex flex-col lg:flex-row justify-between items-start mb-6 gap-6 border-b border-gray-800 pb-6">
        <div>
            <h1 class="text-4xl font-black text-yellow-500 italic uppercase tracking-tighter">MacroPulse AI</h1>
            <p class="text-[11px] text-gray-500 font-mono tracking-widest uppercase mt-1">Institutional Terminal • Mar 06, 2026</p>
        </div>
        
        <div class="flex flex-wrap gap-3 w-full lg:w-auto">
            <div class="bias-box border-l-4 border-l-blue-500">
                <span class="text-[10px] uppercase text-gray-400 font-bold block mb-1">Risk Sentiment</span>
                <div class="text-sm font-black text-blue-400 uppercase italic">RISK-OFF (VIX: 23.75)</div>
            </div>
            <div class="bias-box border-l-4 border-l-yellow-600">
                <span class="text-[10px] uppercase text-gray-400 font-bold block mb-1">Gold Bias</span>
                <div class="text-sm font-black text-yellow-500 uppercase">BULLISH ($5,164)</div>
            </div>
            <div class="bias-box border-l-4 border-l-orange-500">
                <span class="text-[10px] uppercase text-gray-400 font-bold block mb-1">AUD Bias</span>
                <div class="text-sm font-black text-orange-400 uppercase">WEAK (0.7031)</div>
            </div>
            <div class="bias-box border-l-4 border-l-green-500">
                <span class="text-[10px] uppercase text-gray-400 font-bold block mb-1">USA (DXY)</span>
                <div class="text-sm font-black text-green-400 uppercase">STRENGTHENING</div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-3 flex flex-col gap-6">
            <div class="widget-card p-8 border-t-4 border-t-blue-500 h-[200px]">
                <h3 class="text-blue-400 font-black text-xs uppercase tracking-widest text-center mb-4">CBOE VIX SPOT</h3>
                <div class="text-5xl font-black text-white italic text-center">23.75</div>
            </div>
            <div class="widget-card min-h-[540px]">
                <div class="p-2 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-blue-400 text-center">Economic Calendar</div>
                <div class="tradingview-widget-container">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                    { "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%", "importanceFilter": "0,1", "currencyFilter": "USD,AUD" }
                    </script>
                </div>
            </div>
        </div>

        <div class="lg:col-span-6 flex flex-col gap-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 h-[400px]">
                <div class="widget-card" id="gold_main"></div>
                <div class="widget-card" id="aud_main"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 h-[340px]">
                <div class="widget-card">
                    <div class="p-2 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-yellow-500 text-center">XAU/USD Gauge</div>
                    <div class="tradingview-widget-container">
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                        { "interval": "1h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "OANDA:XAUUSD", "showIntervalTabs": true, "displayMode": "single", "colorTheme": "dark" }
                        </script>
                    </div>
                </div>
                <div class="widget-card">
                    <div class="p-2 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-orange-400 text-center">AUD/USD Gauge</div>
                    <div class="tradingview-widget-container">
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                        { "interval": "1h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "FX:AUDUSD", "showIntervalTabs": true, "displayMode": "single", "colorTheme": "dark" }
                        </script>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 widget-card min-h-[760px]">
            <div class="p-4 bg-[#1e222d] border-b border-gray-800 flex justify-between items-center">
                <span class="text-[11px] font-black uppercase text-yellow-500 italic">Live Macro Flow</span>
                <span class="text-[9px] text-green-500 font-bold animate-pulse uppercase">Auto-Refresh</span>
            </div>
            <div class="flex-grow">
                <iframe src="https://www.forexlive.com/widget/news" width="100%" height="100%" style="background: #131722; filter: invert(0.85) hue-rotate(180deg) contrast(1.2);"></iframe>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        window.onload = () => {
            new TradingView.widget({ "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "60", "theme": "dark", "style": "1", "container_id": "gold_main", "hide_top_toolbar": true, "hide_legend": true });
            new TradingView.widget({ "autosize": true, "symbol": "FX:AUDUSD", "interval": "60", "theme": "dark", "style": "1", "container_id": "aud_main", "hide_top_toolbar": true, "hide_legend": true });
        };
    </script>
</body>
</html>
