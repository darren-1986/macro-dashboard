<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | Pure Logic Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow: hidden; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 8px; overflow: hidden; }
        
        /* THE HEADER DESIGN - NO EXTERNAL WIDGETS */
        .bias-box { 
            background: #1e222d; border: 1px solid #363a45; padding: 10px 14px; border-radius: 6px; 
            min-width: 150px; border-left: 4px solid #374151; transition: all 0.3s ease;
        }
        .vix-badge { 
            background: linear-gradient(270deg, #450a0a 0%, #1e222d 100%); 
            border: 1px solid #7f1d1d; border-right: 4px solid #ef4444; padding: 10px 20px;
        }

        .status-bullish { border-left-color: #22c55e !important; }
        .status-bearish { border-left-color: #ef4444 !important; }
        .status-neutral { border-left-color: #f59e0b !important; }

        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #363a45; border-radius: 10px; }
    </style>
</head>
<body class="p-4 h-screen flex flex-col">

    <header class="flex flex-col xl:flex-row justify-between items-center mb-4 gap-4 border-b border-gray-800 pb-4">
        <div class="flex items-center gap-8">
            <div>
                <h1 class="text-2xl font-black text-yellow-500 italic uppercase leading-none">MacroPulse AI</h1>
                <p class="text-[9px] text-gray-500 font-mono tracking-widest uppercase mt-1">Institutional HUD</p>
            </div>
            
            <div class="flex gap-3">
                <div class="bias-box" id="box-sent">
                    <span class="text-[9px] uppercase text-gray-400 font-bold block mb-1">Sentiment</span>
                    <div id="val-sent" class="text-xs font-black uppercase">Syncing...</div>
                </div>
                <div class="bias-box" id="box-gold">
                    <span class="text-[9px] uppercase text-gray-400 font-bold block mb-1">Gold Bias</span>
                    <div id="val-gold" class="text-xs font-black uppercase">Syncing...</div>
                </div>
                <div class="bias-box" id="box-aud">
                    <span class="text-[9px] uppercase text-gray-400 font-bold block mb-1">Australia</span>
                    <div id="val-aud" class="text-xs font-black uppercase">Syncing...</div>
                </div>
                <div class="bias-box" id="box-usa">
                    <span class="text-[9px] uppercase text-gray-400 font-bold block mb-1">USA (DXY)</span>
                    <div id="val-usa" class="text-xs font-black uppercase">Syncing...</div>
                </div>
            </div>
        </div>
        
        <div class="vix-badge flex items-center gap-4 rounded-md">
            <div class="text-right">
                <span class="text-[10px] font-black uppercase text-red-400 block" id="vix-label">Risk-Off</span>
                <span class="text-[9px] text-gray-500 uppercase font-mono">Mar 06, 2026</span>
            </div>
            <div class="h-10 w-[1px] bg-gray-700"></div>
            <div>
                <span class="text-[9px] uppercase text-gray-400 font-bold block">CBOE VIX SPOT</span>
                <div id="vix-price" class="text-2xl font-black italic leading-none text-white">23.75</div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-12 gap-4 flex-grow overflow-hidden">
        <div class="col-span-3 flex flex-col gap-4">
            <div class="widget-card">
                <div class="p-2 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-yellow-500">Live News</div>
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/dp8PhLsUcFE?autoplay=1&mute=1" frameborder="0"></iframe>
                </div>
            </div>
            <div class="widget-card flex-grow">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                { "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%", "importanceFilter": "0,1", "currencyFilter": "USD,AUD" }
                </script>
            </div>
        </div>

        <div class="col-span-6 flex flex-col gap-4">
            <div id="chart_gold" class="widget-card h-1/2"></div>
            <div id="chart_aud" class="widget-card h-1/2"></div>
        </div>

        <div class="col-span-3 widget-card overflow-y-auto custom-scroll">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
            { "feedMode": "all_symbols", "symbolsGroups": [{"name": "Macro", "symbols": ["OANDA:XAUUSD", "FX:AUDUSD", "TVC:DXY"]}], "isTransparent": true, "displayMode": "regular", "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "en" }
            </script>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function updateLogic() {
            // MARCH 06, 2026 LIVE MARKET DATA POINTS
            const market = {
                vix: 23.75, 
                gold: 5081.63,
                audusd: 0.7038,
                dxy: 99.01
            };

            // 1. VIX / SENTIMENT
            const isRiskOff = market.vix > 20;
            document.getElementById('vix-price').innerText = market.vix;
            document.getElementById('vix-label').innerText = isRiskOff ? "Extreme Fear" : "Risk On";
            
            const sentVal = document.getElementById('val-sent');
            sentVal.innerText = isRiskOff ? "Risk-Off" : "Risk-On";
            sentVal.className = "text-xs font-black uppercase " + (isRiskOff ? "text-red-500" : "text-green-500");
            document.getElementById('box-sent').className = "bias-box " + (isRiskOff ? "status-bearish" : "status-bullish");

            // 2. GOLD BIAS
            const isGoldBull = market.gold > 5000;
            const goldVal = document.getElementById('val-gold');
            goldVal.innerText = isGoldBull ? "Institutional Buy" : "Bearish";
            goldVal.className = "text-xs font-black uppercase " + (isGoldBull ? "text-green-500" : "text-red-500");
            document.getElementById('box-gold').className = "bias-box " + (isGoldBull ? "status-bullish" : "status-bearish");

            // 3. AUSTRALIA (AUD)
            const isAudWeak = market.audusd < 0.7100;
            const audVal = document.getElementById('val-aud');
            audVal.innerText = isAudWeak ? "AUD Weak" : "AUD Strong";
            audVal.className = "text-xs font-black uppercase " + (isAudWeak ? "text-red-500" : "text-green-500");
            document.getElementById('box-aud').className = "bias-box " + (isAudWeak ? "status-bearish" : "status-bullish");

            // 4. USA (DXY)
            const isDxyStrong = market.dxy > 98.50;
            const usaVal = document.getElementById('val-usa');
            usaVal.innerText = isDxyStrong ? "Safe Haven / Strong" : "USD Weak";
            usaVal.className = "text-xs font-black uppercase " + (isDxyStrong ? "text-blue-400" : "text-gray-400");
            document.getElementById('box-usa').className = "bias-box " + (isDxyStrong ? "status-bullish" : "status-neutral");
        }

        window.onload = () => {
            new TradingView.widget({ "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15", "theme": "dark", "container_id": "chart_gold", "hide_top_toolbar": true });
            new TradingView.widget({ "autosize": true, "symbol": "FX:AUDUSD", "interval": "15", "theme": "dark", "container_id": "chart_aud", "hide_top_toolbar": true });
            updateLogic();
        };
    </script>
</body>
</html>
