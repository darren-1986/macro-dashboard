<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | Sentiment Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; height: 100%; }
        .bias-box { background: #1e222d; border: 1px solid #363a45; padding: 12px; border-radius: 8px; text-align: center; flex: 1; }
        .vix-glow { text-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body class="p-4 md:p-6 flex flex-col">

    <header class="flex flex-col lg:flex-row justify-between items-start mb-6 gap-6 border-b border-gray-800 pb-6">
        <div>
            <h1 class="text-4xl font-black text-yellow-500 italic uppercase tracking-tighter">MacroPulse AI</h1>
            <div class="flex items-center gap-2 mt-1">
                <span class="text-[11px] text-gray-500 font-mono tracking-widest uppercase">Institutional Terminal</span>
                <span id="sentiment-tag" class="text-[10px] px-2 py-0.5 rounded font-black uppercase bg-red-900 text-red-200 animate-pulse">Risk-Off Detected</span>
            </div>
        </div>
        
        <div class="flex flex-wrap gap-3 w-full lg:w-auto">
            <div id="risk-box" class="bias-box border-l-4 border-l-red-500">
                <span class="text-[10px] uppercase text-gray-400 font-bold block">Sentiment</span>
                <div id="risk-status" class="text-sm font-black text-red-500 italic uppercase">Risk-Off</div>
            </div>
            <div class="bias-box border-l-4 border-l-yellow-600"><span class="text-[10px] uppercase text-gray-400 font-bold block">Gold Bias</span><div class="text-sm font-black text-yellow-500 italic uppercase">Bullish</div></div>
            <div class="bias-box border-l-4 border-l-orange-500"><span class="text-[10px] uppercase text-gray-400 font-bold block">Australia</span><div class="text-sm font-black text-orange-400 italic uppercase">AUD Weak</div></div>
            <div class="bias-box border-l-4 border-l-green-500"><span class="text-[10px] uppercase text-gray-400 font-bold block">USA (DXY)</span><div class="text-sm font-black text-green-400 italic uppercase">Strong</div></div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow overflow-hidden pb-4">
        
        <div class="lg:col-span-3 flex flex-col gap-6 h-full">
            <div class="widget-card p-8 border-t-4 border-t-red-500 items-center justify-center">
                <h3 class="text-gray-400 font-black text-[10px] uppercase tracking-widest mb-2">CBOE VIX SPOT</h3>
                <div id="vix-val" class="text-6xl font-black text-red-500 italic vix-glow tracking-tighter">23.75</div>
                <p id="vix-desc" class="text-[9px] text-red-400 font-bold mt-2 uppercase">Elevated Fear - Avoid Risk</p>
            </div>
            
            <div class="widget-card flex-grow">
                <div class="p-2 bg-[#1e222d] text-[10px] font-bold border-b border-gray-800 uppercase text-blue-400 text-center">Macro Events</div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                { "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%", "importanceFilter": "0,1", "currencyFilter": "USD,AUD" }
                </script>
            </div>
        </div>

        <div class="lg:col-span-6 flex flex-col gap-6">
            <div class="grid grid-cols-2 gap-4 h-1/2">
                <div id="gold_chart" class="widget-card"></div>
                <div id="aud_chart" class="widget-card"></div>
            </div>
            <div class="grid grid-cols-2 gap-4 h-1/2">
                <div class="widget-card">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    { "interval": "1h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "OANDA:XAUUSD", "colorTheme": "dark" }
                    </script>
                </div>
                <div class="widget-card">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    { "interval": "1h", "width": "100%", "isTransparent": true, "height": "100%", "symbol": "FX:AUDUSD", "colorTheme": "dark" }
                    </script>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 widget-card">
            <div class="p-4 bg-[#1e222d] border-b border-gray-800 flex justify-between items-center">
                <span class="text-[11px] font-black uppercase text-yellow-500 italic">Market Wire</span>
                <span class="text-[9px] text-green-500 font-bold animate-pulse">LIVE</span>
            </div>
            <div class="flex-grow">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                {
                  "feedMode": "all_symbols",
                  "symbolsGroups": [{
                    "name": "Macro",
                    "symbols": ["OANDA:XAUUSD", "FX:AUDUSD", "TVC:DXY"]
                  }],
                  "isTransparent": true,
                  "displayMode": "regular",
                  "width": "100%",
                  "height": "100%",
                  "colorTheme": "dark",
                  "locale": "en"
                }
                </script>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        window.onload = () => {
            new TradingView.widget({ "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "60", "theme": "dark", "container_id": "gold_chart", "hide_top_toolbar": true });
            new TradingView.widget({ "autosize": true, "symbol": "FX:AUDUSD", "interval": "60", "theme": "dark", "container_id": "aud_chart", "hide_top_toolbar": true });
            
            // LOGIC FOR RISK ON/OFF
            const vix = 23.75;
            const statusText = document.getElementById('risk-status');
            const sentimentTag = document.getElementById('sentiment-tag');
            
            if (vix > 20) {
                statusText.innerText = "RISK-OFF";
                statusText.classList.add('text-red-500');
                sentimentTag.innerText = "Risk-Off Detected";
                sentimentTag.className = "text-[10px] px-2 py-0.5 rounded font-black uppercase bg-red-900 text-red-100 animate-pulse";
            } else {
                statusText.innerText = "RISK-ON";
                statusText.classList.add('text-green-500');
                sentimentTag.innerText = "Risk-On / Stable";
                sentimentTag.className = "text-[10px] px-2 py-0.5 rounded font-black uppercase bg-green-900 text-green-100";
            }
        };
    </script>
</body>
</html>
