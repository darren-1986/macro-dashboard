<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroPulse AI | 2026 Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060809; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .widget-card { background: #131722; border: 1px solid #2a2e39; border-radius: 8px; overflow: hidden; height: 100%; display: flex; flex-direction: column; }
        .bias-box { background: #1e222d; border: 1px solid #363a45; padding: 10px; border-radius: 6px; text-align: center; flex: 1; }
        iframe { border: none !important; }
    </style>
</head>
<body class="p-4">

    <header class="flex flex-col lg:flex-row justify-between items-center mb-4 gap-4">
        <div class="flex flex-col">
            <h1 class="text-3xl font-black text-yellow-500 italic tracking-tighter uppercase">MacroPulse AI</h1>
            <p class="text-[10px] text-gray-500 font-mono uppercase tracking-[0.2em]">Institutional Terminal • Mar 06, 2026</p>
        </div>
        
        <div class="flex gap-3 w-full lg:w-2/3">
            <div class="bias-box border-l-4 border-l-blue-500">
                <span class="text-[9px] uppercase text-gray-400 font-bold block mb-1">Risk Sentiment</span>
                <div class="text-xs font-black text-blue-400 italic">RISK-OFF (VIX: 23.75)</div>
            </div>
            <div class="bias-box border-l-4 border-l-yellow-600">
                <span class="text-[9px] uppercase text-gray-400 font-bold block mb-1">Gold Bias</span>
                <div class="text-xs font-black text-yellow-500 italic">BULLISH ($5,164)</div>
            </div>
            <div class="bias-box border-l-4 border-l-orange-500">
                <span class="text-[9px] uppercase text-gray-400 font-bold block mb-1">AUD Bias</span>
                <div class="text-xs font-black text-orange-400 italic">WEAK (0.7031)</div>
            </div>
            <div class="bias-box border-l-4 border-l-green-500">
                <span class="text-[9px] uppercase text-gray-400 font-bold block mb-1">USA (DXY)</span>
                <div class="text-xs font-black text-green-400 italic">STRENGTHENING</div>
            </div>
        </div>
    </header>

    <main class="grid grid-cols-12 gap-4 h-[calc(100vh-120px)]">
        
        <div class="col-span-3 flex flex-col gap-4">
            <div class="widget-card p-6 items-center justify-center border-t-2 border-blue-500">
                <h3 class="text-blue-400 font-black text-[10px] uppercase tracking-widest mb-2">VIX Spot</h3>
                <div class="text-5xl font-black text-white italic tracking-tighter">23.75</div>
                <div class="text-[9px] text-red-500 font-bold mt-2 animate-pulse uppercase">Market Turbulence High</div>
            </div>
            <div class="widget-card flex-grow">
                <iframe src="https://sslecal2.investing.com?eco_importance=2,3&columns=exc_flags,exc_currency,exc_importance,exc_actual,exc_forecast,exc_previous&category=_employment,_economicIndicators,_centralBanks,_inflation&countries=5,25&calType=day&timeZone=1&lang=1" width="100%" height="100%"></iframe>
            </div>
        </div>

        <div class="col-span-6 flex flex-col gap-4">
            <div class="grid grid-cols-2 gap-4 h-2/3">
                <div class="widget-card" id="gold_chart"></div>
                <div class="widget-card" id="aud_chart"></div>
            </div>
            <div class="grid grid-cols-2 gap-4 h-1/3">
                <div class="widget-card">
                    <div class="p-1 bg-[#1e222d] text-[9px] font-bold text-center text-yellow-500 uppercase border-b border-gray-800">XAU/USD Gauge</div>
                    <div class="flex-grow" id="gold_gauge"></div>
                </div>
                <div class="widget-card">
                    <div class="p-1 bg-[#1e222d] text-[9px] font-bold text-center text-orange-400 uppercase border-b border-gray-800">AUD/USD Gauge</div>
                    <div class="flex-grow" id="aud_gauge"></div>
                </div>
            </div>
        </div>

        <div class="col-span-3 widget-card border-t-2 border-yellow-600">
            <div class="p-3 bg-[#1e222d] border-b border-gray-800 flex justify-between">
                <span class="text-[10px] font-black uppercase text-yellow-500">Live Macro Flow</span>
                <span class="text-[9px] text-green-500 font-bold italic animate-pulse">LIVE SOCKET</span>
            </div>
            <div class="flex-grow">
                <iframe src="https://www.widgets.investing.com/live-currency-cross-rates?theme=darkTheme&hideColumn=bid,ask,high,low&pairs=8830,1,2,3,7,9" width="100%" height="100%"></iframe>
            </div>
        </div>
    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        window.onload = () => {
            new TradingView.widget({ "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "60", "theme": "dark", "style": "1", "container_id": "gold_chart", "hide_top_toolbar": true, "withdateranges": false, "save_image": false });
            new TradingView.widget({ "autosize": true, "symbol": "FX:AUDUSD", "interval": "60", "theme": "dark", "style": "1", "container_id": "aud_chart", "hide_top_toolbar": true, "withdateranges": false, "save_image": false });
            
            new TradingView.widget({ "interval": "4h", "width": "100%", "height": "100%", "isTransparent": true, "symbol": "OANDA:XAUUSD", "colorTheme": "dark", "container_id": "gold_gauge" });
            new TradingView.widget({ "interval": "4h", "width": "100%", "height": "100%", "isTransparent": true, "symbol": "FX:AUDUSD", "colorTheme": "dark", "container_id": "aud_gauge" });
        };
    </script>
</body>
</html>
